            `zaterdag ${+edD[2]} ${NL_M[+edD[1] - 1]} ${edD[0]} \u00b7 nr. ${ed.nr} \u00b7 alleen goed nieuws`;

        function pageHTML(i) {
            if (i === 0) return `<div class="mast"><b>De Zonzijde</b><s>${DATELINE}</s></div>` +
                `<div id="wx"><b>het weer</b><span class="sun"></span><s>zonnig \u00b7 27\u00b0 \u00b7 Wijchen</s></div>`;
            let ex = '';
            if (i === 1) ex =
                `<div class="gb" data-gb style="left:148px;top:172px;width:86px;height:138px"><em>colofon</em></div>`;
            if (i === 3) ex =
                `<div class="gb" data-gb style="left:158px;top:190px;width:76px;height:120px"><em>puzzel</em></div>`;
            return `<div class="hdr"><span>De Zonzijde</span><span>pagina ${i + 1}</span></div>` + ex;
        }
        const pages = PG.map((p, i) => sp('page', pageHTML(i), p.x, p.y, 0, 0));

        const SLOTDEF = [
            { pos: 1, pg: 0, x: 10, y: 56, w: 112, h: 254, illo: { x: 0, y: 15, w: 112, h: 54 } },
            { pos: 2, pg: 0, x: 132, y: 112, w: 96, h: 198, illo: null },
            { pos: 3, pg: 1, x: 10, y: 34, w: 224, h: 130, illo: { x: 138, y: 15, w: 86, h: 52 } },
            { pos: 4, pg: 1, x: 10, y: 172, w: 130, h: 138, illo: null },
            { pos: 5, pg: 2, x: 10, y: 34, w: 224, h: 196, illo: { x: 0, y: 15, w: 224, h: 56 } },
            { pos: 6, pg: 2, x: 10, y: 238, w: 224, h: 72, illo: null },
            { pos: 7, pg: 3, x: 10, y: 34, w: 224, h: 148, illo: { x: 144, y: 15, w: 80, h: 50 } },
            { pos: 8, pg: 3, x: 10, y: 190, w: 138, h: 120, illo: null },
        ];
        const SLOTS = SLOTDEF.map(def => {
            const el = document.createElement('div');
            el.className = 'slot';
            el.style.cssText = `left:${def.x}px;top:${def.y}px;width:${def.w}px;height:${def.h}px`;
            const hl = document.createElement('div');
            hl.className = 'hl';
            el.appendChild(hl);
            let illoEl = null;
            if (def.illo) {
                illoEl = document.createElement('div');
                illoEl.className = 'illo';
                illoEl.style.cssText =
                `left:${def.illo.x}px;top:${def.illo.y}px;width:${def.illo.w}px;height:${def.illo.h}px`;
                illoEl.innerHTML = '<span class="h"></span>';
                el.appendChild(illoEl);
            }
            const topIllo = def.illo && def.illo.x === 0 && def.illo.w >= def.w - 2;
            const lines = [];
            let y = topIllo ? def.illo.y + def.illo.h + 8 : 17,
                li = 0;
            for (; y <= def.h - 4; y += 7, li++) {
                let w = def.w;
                if (def.illo && !topIllo && y > def.illo.y - 4 && y < def.illo.y + def.illo.h + 4) w = def.illo.x - 6;
                w *= (li % 6 === 5) ? (.42 + rnd() * .22) : (.95 + rnd() * .05);
                const ln = document.createElement('i');
                ln.className = 'ln';
                ln.style.cssText = `left:0;top:${y}px;width:${w.toFixed(1)}px`;
                el.appendChild(ln);
                lines.push({ el: ln, wx: PG[def.pg].x + def.x, wy: PG[def.pg].y + def.y + y, w });
            }
            pages[def.pg].el.appendChild(el);
            return { def, meta: SLOTMETA[def.pos], el, hl, illoEl, lines,
                wx: PG[def.pg].x + def.x, wy: PG[def.pg].y + def.y };
        });

        /* ---------- topic bundles ---------- */
        const finalsByPos = {};
        DATA.items.forEach(d => { if (d.ft === 'final' && d.scr > 0) (finalsByPos[d.slot.pos] = finalsByPos[d.slot.pos] || [])
                .push(d); });
        const chosenG = DATA.slots.map(s => {
            const members = finalsByPos[s.pos] || [];
            return { pos: s.pos, geo: s.geo, kind: members.length ? 'final' : 'ghost', members, label: s.werktitel };
        });
        chosenG.forEach((g, i) => {
            const S = SLOTS.find(s => s.def.pos === g.pos);
            const cs = S.def.w / 150 * .98;
            g.cs = cs;
            const mem = g.members.map((d, mi) =>
                `<div class="clip" style="transform:translate(${3 + mi * 4}px,${3 + mi * 4}px) rotate(${mi === 0 ? 0 : (mi % 2 ? 4 : -4)}deg)">` +
                `<div class="b">${esc(d.b)}</div><div class="ttl">${esc(d.ttl)}</div></div>`).join('');
            const sheets =
                `<span class="sheet" style="transform:translate(4px,11px) rotate(${(rnd() * 6 - 3).toFixed(1)}deg)"></span>` +
                (g.members.length > 1 ?
                    `<span class="sheet" style="transform:translate(7px,14px) rotate(${(rnd() * 6 - 3).toFixed(1)}deg)"></span>` :
                    '');
            const ribs =
                `<span class="rib" style="left:132px;top:4px;transform:rotate(${(rnd() * 10 - 5).toFixed(1)}deg)"></span>`;
            g.b = sp('topic' + (g.kind === 'ghost' ? ' ghost' : ''),
                sheets + (g.kind === 'ghost' ? '<span class="base"></span>' : '') + mem +
                `<div class="tag" style="--tagc:${GEOC[g.geo]}">${esc(g.label)}</div>` + ribs,
                S.wx + 1, S.wy + 4, 0, 0);
            g.b.s = cs;
            g.b.apply();
        });

        /* ---------- timeline ---------- */
        at(.4, () => pages.forEach(p => tw(p, { o: 1 }, simT, 1.6, eio)));
        at(1.2, () => chosenG.forEach((g, i) => tw(g.b, { o: 1 }, simT, .5 + i * .06, eo)));

        /* F7 · Schrijven */
        chosenG.forEach((g, i) => {
            const S = SLOTS.find(s => s.def.pos === g.pos);
            const t0 = 5 + i * 29,
                L = S.lines.length,
                wdur = 21;
            at(t0, () => { g.caret = sp('caret', '', S.lines[0].wx, S.lines[0].wy, 0, 1); });
            S.lines.forEach((ln, j) => {
                at(t0 + j * (wdur / L), () => {
                    ln.el.classList.add('on');
                    if (g.caret && !g.caret.dead) {
                        cutTweens(g.caret);
                        g.caret.x = ln.wx;
                        g.caret.y = ln.wy - 1;
                        g.caret.apply();
                        tw(g.caret, { x: ln.wx + ln.w }, simT, (wdur / L) * .92, lin);
                    }
                });
            });
            at(t0 + wdur + .8, () => { if (g.caret) kill(g.caret); });
            at(t0 + 1.4, () => tw(g.b, { s: g.cs * .22, o: 0, y: g.b.y + 8 }, simT, 9.5, eio, () => kill(g.b)));
        });

        /* F8 · Redactie */
        chosenG.forEach((g, i) => {
            const S = SLOTS.find(s => s.def.pos === g.pos);
            const t0 = 246 + i * 21,
                full = S.meta.finalttl,
                L = S.lines.length;
            for (let cix = 1; cix <= full.length; cix++)
                at(t0 + cix * .085, () => { S.hl.textContent = full.slice(0, cix); });
            S.lines.forEach((ln, j) => {
                const tj = t0 + 4.5 + j * (9.5 / L);
                at(tj, () => ln.el.classList.add('hot'));
                at(tj + .85, () => ln.el.classList.remove('hot'));
            });
            const e1 = Math.floor(rnd() * L),
                e2 = Math.floor(rnd() * L);
            at(t0 + 7, () => S.lines[e1] && S.lines[e1].el.classList.add('edit'));
            at(t0 + 11, () => S.lines[e2] && S.lines[e2].el.classList.add('edit'));
        });

        /* F9 · Vormgeven + finale */
        let ii = 0;
        SLOTS.forEach(S => { if (S.illoEl) { at(426 + ii * 4, () => S.illoEl.classList.add('draw'));
                ii++; } });
        at(440, () => { const w = document.getElementById('wx'); if (w) w.classList.add('filled'); });
        at(446, () => document.querySelectorAll('[data-gb]').forEach(el => el.classList.add('on')));
        at(452, () => pages.forEach(p => p.el.classList.add('done')));
        at(TOTAL - 2, () => tw(cam, { fh: 712 }, simT, 2.5, eio));
        at(TOTAL + 1, () => document.getElementById('fin').classList.add('on'));

        /* ---------- HUD ---------- */
        const hud = document.createElement('div');
        hud.id = 'hud';
        hud.innerHTML = `<div id="stampx"></div><div id="fin"></div>`;
        document.body.appendChild(hud);

        const stampEl = document.getElementById('stampx');

        function setStamp(t) { stampEl.textContent = t;
            stampEl.classList.remove('th');
            void stampEl.offsetWidth;
            stampEl.classList.add('th'); }
        document.getElementById('fin').innerHTML =
            `Editie ${ed.nr} \u00b7 ${+edD[2]} ${NL_M[+edD[1] - 1]} \u00b7 ${DATA.counts.final} artikelen \u00b7 ${ed.words} woorden` +
            `<button onclick="location.reload()">opnieuw</button>`;
        at(.05, () => setStamp('F7 \u00b7 Schrijven'));
        at(245, () => setStamp('F8 \u00b7 Redactie'));
        at(425, () => setStamp('F9 \u00b7 Vormgeven'));
        at(TOTAL + .5, () => setStamp('klaar \u2713'));

        /* ---------- main loop ---------- */
        events.sort((a, b) => a[0] - b[0]);
        let evi = 0,
            lastRt = performance.now();

        function frame(rt) {
            const dt = Math.min(.09, (rt - lastRt) / 1000);
            lastRt = rt;
            if (simT < END) simT = Math.min(END, simT + dt);
            while (evi < events.length && events[evi][0] <= simT) { events[evi][1]();
                evi++; }
            for (let i = tweens.length - 1; i >= 0; i--) {
                const t = tweens[i];
                if (simT < t.t0) continue;
                if (!t.from) { t.from = {};
                    for (const k in t.to) t.from[k] = t.o[k]; }
                let p = (simT - t.t0) / (t.t1 - t.t0);
                if (p > 1) p = 1;
                const e = t.es(p);
                for (const k in t.to) t.o[k] = t.from[k] + (t.to[k] - t.from[k]) * e;
                t.o.apply && t.o.apply();
                if (p === 1) { tweens.splice(i, 1); if (t.done) t.done(); }
            }
            layoutCam();
            requestAnimationFrame(frame);
        }
        layoutCam();
        requestAnimationFrame(t => { lastRt = t;
            frame(t); });
    </script>
</body>
</html>
