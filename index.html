<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>De Zonzijde — goed nieuws</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,560;9..144,640&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Archivo:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root{
    --paper:#FAF9F6;
    --desk:#ECEAE3;
    --ink:#1B1B17;
    --muted:#6B6A61;
    --hair:#D6D4CB;
    --spot:#356B4B;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--desk);
    color:var(--ink);
    font-family:"Newsreader",Georgia,serif;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Toolbar (screen only) ---------- */
  .toolbar{
    position:sticky;top:0;z-index:10;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:7px 12px;
    background:rgba(250,249,246,.92);
    backdrop-filter:saturate(1.2) blur(4px);
    border-bottom:1px solid var(--hair);
    font-family:"Archivo",system-ui,sans-serif;font-size:12px;
  }
  .toolbar .brand{font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--spot)}
  .toolbar .grow{flex:1}
  .toolbar .status{color:var(--muted)}
  button{
    font-family:"Archivo",system-ui,sans-serif;font-size:12px;font-weight:600;
    letter-spacing:.02em;
    padding:5px 11px;border:1px solid var(--ink);border-radius:0;
    background:var(--paper);color:var(--ink);cursor:pointer;
  }
  button:hover{background:var(--ink);color:var(--paper)}
  button:disabled{opacity:.5;cursor:default}
  button:focus-visible{outline:2px solid var(--spot);outline-offset:2px}
  .spin{
    width:11px;height:11px;border:2px solid var(--hair);border-top-color:var(--spot);
    border-radius:50%;display:inline-block;vertical-align:-1px;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.spin{animation:none}}

  /* ---------- Paper ---------- */
  #paper{
    width:210mm;max-width:100%;margin:14px auto 40px;
    background:var(--paper);
    padding:11mm 12mm 14mm;
    box-shadow:0 1px 0 rgba(0,0,0,.04),0 12px 28px rgba(0,0,0,.10);
  }

  /* ---------- Masthead ---------- */
  #masthead{text-align:center;margin-bottom:5mm}
  .mh-top{
    display:flex;justify-content:space-between;align-items:flex-end;
    font-family:"Archivo",sans-serif;font-size:10px;text-transform:uppercase;
    letter-spacing:.14em;color:var(--muted);
    border-bottom:1px solid var(--ink);padding-bottom:3px;
  }
  #nameplate{
    font-family:"Fraunces",serif;font-weight:640;font-optical-sizing:auto;
    font-size:clamp(34px,7vw,52px);line-height:.95;margin:6px 0 4px;
    letter-spacing:.005em;
  }
  .mh-sub{
    font-family:"Archivo",sans-serif;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink);
    border-top:2px solid var(--spot);border-bottom:1px solid var(--ink);
    padding:4px 0;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;
  }
  .mh-sub .dot{color:var(--spot)}

  /* ---------- Sections ---------- */
  .sec{margin-top:6mm;padding-top:3mm;border-top:1px solid var(--hair)}
  .sec:first-of-type{border-top:none;padding-top:0}
  .kicker{display:flex;align-items:baseline;gap:8px;margin-bottom:3mm}
  .k-label{
    font-family:"Archivo",sans-serif;font-weight:700;font-size:13px;
    text-transform:uppercase;letter-spacing:.13em;color:var(--spot);
  }
  .k-sub{font-family:"Newsreader",serif;font-style:italic;font-size:12px;color:var(--muted)}
  .k-rule{flex:1;height:1px;background:var(--ink);align-self:center}

  .items{column-width:56mm;column-gap:6mm}
  .item{break-inside:avoid;margin:0 0 4.5mm;padding-bottom:4mm;border-bottom:1px solid var(--hair)}
  .item:last-child{border-bottom:none}
  .item h2{
    font-family:"Fraunces",serif;font-weight:560;font-size:14.5px;line-height:1.18;
    margin:0 0 2px;
  }
  .item .meta{
    font-family:"Archivo",sans-serif;font-size:9.5px;text-transform:uppercase;
    letter-spacing:.07em;color:var(--muted);margin-bottom:3px;
  }
  .item p{font-size:12.5px;line-height:1.45;margin:0;color:#28281f;text-align:justify;hyphens:auto;-webkit-hyphens:auto}

  .item.lead{column-span:all;border-bottom:1.5px solid var(--ink);margin-bottom:5mm;padding-bottom:4mm}
  .item.lead h2{font-size:clamp(19px,2.4vw,24px);line-height:1.12;font-weight:640;margin-bottom:3px}
  .item.lead p{font-size:13.5px;line-height:1.42;text-align:justify}

  /* Clean single column while exporting to PDF (html2canvas handles multicol poorly) */
  .exporting #paper{box-shadow:none}
  .exporting .items{column-width:auto;column-count:1}
  .exporting .item.lead{column-span:none}

  .empty{font-family:"Newsreader",serif;font-style:italic;color:var(--muted);font-size:12.5px}
  .hint{
    text-align:center;color:var(--muted);font-style:italic;font-size:13px;
    padding:12mm 4mm;
  }

  /* ---------- Print ---------- */
  @page{size:A4;margin:13mm}
  @media print{
    body{background:#fff}
    .toolbar{display:none}
    #paper{width:auto;max-width:none;margin:0;padding:0;box-shadow:none}
    .item{break-inside:avoid}
  }

  @media (max-width:520px){
    #paper{padding:14px;margin:8px auto 30px}
  }
</style>
</head>
<body>

<div class="toolbar">
  <span class="brand">De Zonzijde</span>
  <button id="gen" onclick="genereer()">Genereer krant</button>
  <button id="pdf" onclick="exportPDF()">PDF</button>
  <button id="prn" onclick="window.print()">Print</button>
  <button id="cpy" onclick="kopieer()">Kopieer</button>
  <button id="key" onclick="stelSleutelIn()">Sleutel</button>
  <span class="grow"></span>
  <span class="status" id="status">Klaar om te verzamelen</span>
</div>

<main id="paper">
  <header id="masthead">
    <div class="mh-top">
      <span id="edition">Editie Wijchen</span>
      <span>Nr. 1</span>
    </div>
    <h1 id="nameplate">De Zonzijde</h1>
    <div class="mh-sub">
      <span id="tagline">Alleen goed nieuws</span>
      <span class="dot">◆</span>
      <span id="date">—</span>
    </div>
  </header>
  <div id="sections">
    <p class="hint">Klik op <strong>Genereer krant</strong> om het goede nieuws van vandaag op te halen.</p>
  </div>
</main>

<script>
  /* ====== Rename / retune here ====== */
  const TITLE   = "De Zonzijde";
  const TAGLINE = "Alleen goed nieuws";
  const PLACE   = "Wijchen";
  const COUNT = 3;   // berichten per sectie — hoger = meer pagina's

  const SECTIONS = [
    { key:"stad",   label:"Stad",   sub:"Wijchen",                        scope:"de gemeente Wijchen",                                    count:COUNT },
    { key:"regio",  label:"Regio",  sub:"Gelderland",                       scope:"de provincie Gelderland, met nadruk op Rijk van Nijmegen", count:COUNT },
    { key:"land",   label:"Land",   sub:"Nederland",                      scope:"Nederland (landelijk nieuws)",                           count:COUNT },
    { key:"wereld", label:"Wereld", sub:"",                               scope:"de wereld (internationaal nieuws)",                      count:COUNT },
  ];

  // Preferred outlets used to steer the search (v1: hints, not hard feeds).
  const SOURCE_HINTS = {
    stad:   "wijchensnieuws.nl, wijchen.nieuws.nl, RN7.nl, Omroep Gelderland Wijchen (gld.nl/wijchen), De Gelderlander (Wijchen), gemeente Wijchen (wijchen.nl). Varieer over meerdere bronnen — niet alleen de gemeentesite wijchen.nl",
    regio:  "Omroep Gelderland (gld.nl, regio Rijk van Nijmegen), De Gelderlander",
    land:   "NOS, NU.nl, Rijksoverheid",
    wereld: "Good News Network, Positive News, Reasons to be Cheerful, BBC"
  };

  /* ====== Vaste editie — Wijchen, zondag 28 juni 2026 ======
     Deze inhoud staat vast in de pagina zodat de krant direct toont,
     zonder API-sleutel. Klik op ‘Genereer krant’ om te verversen. */
  const PRELOAD_DATE = "2026-06-28";
  const PRELOAD = {
    stad: [
      { kop:"Bergharen heeft weer een eigen ontmoetingsplek: Vincent Veltmaat krijgt Zilveren Draagspeld",
        bron:"wijchen.nieuws.nl", datum:"2026-06-25",
        samenvatting:"Een bijzonder moment in Bergharen: tijdens de officiële opening van Buurtmarkt Blije Bikkels reikte burgemeester Renske Helmer-Englebert de Zilveren Draagspeld van de gemeente Wijchen uit aan Vincent Veltmaat. Hij ontving de gemeentelijke onderscheiding vanwege zijn uitzonderlijke inzet voor de leefbaarheid van het dorp. Na het sluiten van de supermarkt in 2020 en het verdwijnen van de laatste winkel in 2022 dreigde Bergharen zijn voorzieningenniveau kwijt te raken. Veltmaat zette zich de afgelopen zes jaar vrijwel dagelijks in als vrijwilliger en projectleider om dat tij te keren. Hij begeleidde onderzoek naar de levensvatbaarheid van een nieuwe buurtwinkel, trok subsidies binnen, regelde de bouw van een bakkerij en horecaruimte, en stelde teams samen — waaronder mensen met een afstand tot de arbeidsmarkt. Met zijn brede netwerk bracht hij vrijwilligers, ondernemers, zorgpartners en de gemeente samen. Buurtmarkt Blije Bikkels is nu een volwaardige winkel én ontmoetingsplek voor inwoners van Bergharen, Hernen en Leur. Een inspirerend verhaal over wat doorzettingsvermogen en gemeenschapszin kunnen bereiken." },
      { kop:"Wijchen zet drie gebiedscoördinatoren in als vaste gezichten in de wijk",
        bron:"regioonline.nl / gemeente Wijchen", datum:"2026-06-24",
        samenvatting:"Wie een idee heeft voor zijn buurt of een vraag voor de gemeente, heeft in Wijchen voortaan een vast aanspreekpunt. De gemeente heeft drie gebiedscoördinatoren aangesteld die actief in de wijken en kernen aan de slag gaan. Zij luisteren naar wat er speelt, verbinden mensen en initiatieven, en zorgen ervoor dat ideeën uit de wijk een plek krijgen binnen de gemeentelijke organisatie. Met deze aanpak wil Wijchen de samenwerking met de samenleving versterken en werken aan prettige, toekomstbestendige buurten. Elke coördinator heeft een eigen werkgebied: Wouter Keijzer is aanspreekpunt voor Noord Wijchen, Bergharen, Hernen en Leur; Marlies Taal richt zich op Wijchen-Centrum, Huurlingsedam, Alverna en de bedrijventerreinen; en Ariel Daniëls is actief voor Wijchen-Zuid, Balgoij, Batenburg en Niftrik. Samen met inwoners stellen zij ook wijk- en kernaanpakken op, die aansluiten bij de toekomstvisie Wijchen 2035. Wethouder Twan van Bronkhorst reageerde enthousiast op de start van de nieuwe aanpak. Inwoners kunnen contact opnemen via wijchen.nl/gebiedscoordinatoren." },
      { kop:"Wijchense Berg in Alverna krijgt een frisse toekomst als recreatiegebied voor iedereen",
        bron:"weekblad-wegwijs.nl / gemeente Wijchen", datum:"2026-06-24",
        samenvatting:"De Wijchense Berg in Alverna, ooit een gesloten stortplaats, staat aan de vooravond van een nieuwe toekomst als openbaar recreatiegebied. De gemeente Wijchen heeft gekozen voor een uitgebreide aanpak waarbij de voormalige stortplaats niet alleen veiliger wordt gemaakt, maar ook geschikt blijft voor wandelaars en mountainbikers. Het college koos daarbij voor het meest ambitieuze van drie onderzochte scenario's. Zodra de werkzaamheden zijn afgerond, kan iedereen er weer veilig terecht. Wandelaars kunnen dan boven op de berg genieten van het uitzicht over de omgeving, terwijl mountainbikers optimaal gebruik kunnen maken van de hoogteverschillen. De gemeente benadrukt dat veiligheid en gezondheid daarbij altijd vooropstaan: er wordt zorgvuldig gemeten en onderzocht voor er ook maar iets gebeurt. Een plek die jarenlang gesloten was, wordt zo omgetoverd tot een uitnodigende groene long die mensen samenbrengt. De aanpak past in de bredere ambitie van Wijchen om de openbare ruimte levendig, veilig en toegankelijk te houden voor alle inwoners." }
    ],
    regio: [
      { kop:"Kunstroute Lent viert tweede editie met dertig kunstenaars en jongerenwerkplaats",
        bron:"Nijmegen Nieuws / wegwijzer024.nl", datum:"2026-06-27",
        samenvatting:"Dit weekend, op zaterdag 27 en zondag 28 juni, vindt in Lent de tweede editie van Kunstroute Lent plaats, een gratis tweedaags kunstevenement in de Nijmeegse wijk aan de andere kant van de Waal. Bijna 35 kunstenaars uit Lent en Nijmegen tonen hun werk op uiteenlopende plekken in de wijk, van schilderkunst en keramiek tot fotografie, beeldhouwkunst en mixed media. De route loopt langs eigen ateliers aan de Vrouwe Udasingel en langs vijf gemeenschappelijke expositielocaties, waaronder Café Waalzicht en de historische tuinderij De Warmoes. Nieuw dit jaar is een kunstzinnige Jongerenwerkplaats in de Ontmoetfabriek, speciaal gericht op jongere bezoekers en kunstliefhebbers van de toekomst. Conservator Emiel van der Pol van het Valkhof Museum verzorgde de officiële aftrap en prees het initiatief als belangrijk om kunst ook aan de andere kant van de Waal vrij toegankelijk te maken. De route is te doen per fiets of te voet, en is gratis toegankelijk voor iedereen. Van 12.00 tot 17.00 uur kunnen bezoekers op eigen tempo langs alle locaties wandelen of fietsen. De Kunstroute werd mede mogelijk gemaakt dankzij steun van de gemeente Nijmegen en Stichting De Schepper Delft." }
    ],
    land: [
      { kop:"Oranje door als groepswinnaar: Nederland treft Marokko in knock-outfase WK",
        bron:"NOS / Voetbalzone", datum:"2026-06-26",
        samenvatting:"Het Nederlands elftal heeft zich zondag als ongeslagen groepswinnaar geplaatst voor de knock-outfase van het WK 2026 in Noord-Amerika. Met een overtuigende 3-1 zege op Tunesië in Kansas City eindigde Oranje bovenaan in groep F met zeven punten. Al na twee minuten stond Nederland op voorsprong via een eigen doelpunt van Skhiri, waarna Brian Brobbey snel de 0-2 binnenkopte. Tunesië maakte weliswaar de aansluitingstreffer, maar Oranje zorgde vlak daarna voor de definitieve 1-3. De ploeg van bondscoach Ronald Koeman bereidt zich nu vol vertrouwen voor op de zestiende finale. Die wordt in de nacht van maandag op dinsdag om 03.00 uur gespeeld in Monterrey, Mexico. Tegenstander Marokko eindigde als tweede in groep C met eveneens zeven punten. Bij winst op Marokko wacht Oranje een kraker tegen de winnaar van Zuid-Afrika of Canada in de achtste finales. Heel Nederland kijkt reikhalzend uit naar wat op papier een spraakmakende WK-avond belooft te worden." }
    ],
    wereld: [
      { kop:"Groene economie overtreft zorg in beurswaarde en groeit sneller dan ooit",
        bron:"Positive News", datum:"2026-06-26",
        samenvatting:"De groene economie heeft een indrukwekkende mijlpaal bereikt: ze heeft de zorgsector overtroffen in totale marktwaarde, zo blijkt uit een nieuw rapport van beursdataspecialist LSEG. Als de groene sector officieel als eigenstandige categorie zou worden geclassificeerd, zou zij wereldwijd de derde grootste zijn, alleen overtroffen door technologie en industriële goederen en diensten. Ondanks tegenwind van sommige populistische regeringen bleven de groene inkomsten stijgen. Het rapport stelt dat de mondiale groene economie in 2026 wordt aangedreven door zowel energieveiligheid als klimaatdoelstellingen. De huidige energiecrisis versnelt die verschuiving juist, omdat ze de voordelen van groene technologieën op het gebied van schaalbaarheid en voorzieningszekerheid benadrukt. Tegelijkertijd registreerde Carbon Brief dat in het VK, in het jaar tot mei 2026, voor het eerst meer elektrische auto's werden verkocht dan benzineauto's: 516.490 elektrische voertuigen tegenover 504.010 benzineauto's. Bovendien besparen EV-rijders in het VK gemiddeld 1.100 pond per jaar op brandstofkosten. Een dubbele doorbraak die aantoont dat de energietransitie breed gedragen en economisch aantrekkelijk wordt." },
      { kop:"Wereldwijde bloeddonaties stijgen met bijna een vijfde dankzij vrijwilligers",
        bron:"Positive News", datum:"2026-06-26",
        samenvatting:"Wereldwijd worden steeds meer levens gered door een groeiend leger van bloeddonoren. Uit nieuwe cijfers van de Wereldgezondheidsorganisatie (WHO), gebaseerd op gegevens uit 132 landen, blijkt dat het aantal bloeddonaties tussen 2013 en 2023 met bijna 19 procent is gestegen. In 2023 werden wereldwijd naar schatting 120 miljoen bloeddonaties ontvangen, waarvan meer dan 85 procent afkomstig was van onbetaalde vrijwilligers. WHO-directeur-generaal Tedros Adhanom Ghebreyesus noemde de cijfers “bemoedigende vooruitgang”. De toename laat zien dat burgers over de hele wereld bereid zijn om letterlijk iets van zichzelf te geven voor de gezondheid van anderen. Vrijwilligersdonaties vormen daarmee de ruggengraat van veilige bloedvoorziening in ziekenhuizen. De WHO benadrukt dat deze positieve trend verder versterkt moet worden, met name in lage-inkomenslanden waar de toegang tot veilig bloed nog ongelijk verdeeld is. Het goede nieuws inspireert overheden en gezondheidsorganisaties om donorcampagnes wereldwijd verder uit te breiden." }
    ]
  };

  /* ====== UI helpers ====== */
  const $ = id => document.getElementById(id);
  function nowNL(){
    return new Date().toLocaleDateString("nl-NL",
      {weekday:"long",day:"numeric",month:"long",year:"numeric"});
  }
  function longNL(d){               // "zondag 28 juni 2026" voor een vaste datum
    const t = new Date(d);
    if(isNaN(t)) return nowNL();
    return t.toLocaleDateString("nl-NL",
      {weekday:"long",day:"numeric",month:"long",year:"numeric"});
  }
  let editieDatum = null;          // gezet bij een vaste editie, anders vandaag
  function setBusy(b){
    ["gen","pdf","prn","cpy"].forEach(id => { const el = $(id); if(el) el.disabled = b; });
  }
  function setStatus(txt, busy){
    $("status").innerHTML = (busy ? '<span class="spin"></span> ' : '') + txt;
    setBusy(busy);
  }
  let laatste = null;                          // laatst gegenereerde krant (voor Kopieer)
  function flash(msg){
    const s = $("status"); const prev = s.textContent;
    s.textContent = msg;
    setTimeout(() => { if(s.textContent === msg) s.textContent = prev; }, 1800);
  }

  /* ====== API-sleutel (alleen in deze browser opgeslagen) ======
     Deze pagina draait statisch (GitHub Pages) en heeft geen server.
     De Anthropic-sleutel wordt daarom lokaal in de browser bewaard
     (localStorage) en nooit in de repository opgeslagen. */
  const SLEUTEL_KEY = "zonzijde_anthropic_key";
  function getSleutel(){ return localStorage.getItem(SLEUTEL_KEY) || ""; }
  function vraagSleutel(){
    const huidig = getSleutel();
    const inv = prompt(
      "Plak je Anthropic API-sleutel (begint met sk-ant-…).\n" +
      "Wordt alleen in deze browser bewaard, niet online.",
      huidig);
    if(inv === null) return getSleutel();          // geannuleerd → laat staan
    const k = inv.trim();
    if(k) localStorage.setItem(SLEUTEL_KEY, k);
    else  localStorage.removeItem(SLEUTEL_KEY);     // leeg → wissen
    return k;
  }
  function stelSleutelIn(){
    const k = vraagSleutel();
    flash(k ? "Sleutel opgeslagen" : "Sleutel gewist");
  }

  /* ====== Generate — one call per section, sequential + retry ====== */
  async function genereer(){
    let sleutel = getSleutel();
    if(!sleutel) sleutel = vraagSleutel();
    if(!sleutel){
      setStatus("Geen API-sleutel — klik op ‘Sleutel’", false);
      return;
    }
    editieDatum = null;                            // verse editie → datum van vandaag
    const today = new Date().toISOString().slice(0,10);
    const krant = {stad:[],regio:[],land:[],wereld:[]};
    let ok = false;
    let authFout = false;                          // 401/403 → sleutel klopt niet

    // Parallel liep tegen rate limits aan (lege secties); daarom één voor één.
    for(let i=0; i<SECTIONS.length; i++){
      const s = SECTIONS[i];
      setStatus("Verzamelen… "+s.label+" ("+(i+1)+"/"+SECTIONS.length+")", true);
      let items = [];
      try { items = await fetchSection(s, today, sleutel); }
      catch(e){ console.error(s.key, e); if(e && e.auth) authFout = true; }
      if(!items.length && !authFout){             // één herkansing bij leeg of fout
        try { items = await fetchSection(s, today, sleutel); }
        catch(e){ console.error(s.key+" (herkansing)", e); if(e && e.auth) authFout = true; }
      }
      krant[s.key] = items;
      if(items.length) ok = true;
      if(authFout) break;                          // geen zin om door te gaan
    }

    if(authFout){
      $("sections").innerHTML =
        '<p class="hint">De API-sleutel werd geweigerd. Klik op <strong>Sleutel</strong> en plak een geldige Anthropic-sleutel (sk-ant-…).</p>';
      setStatus("Sleutel ongeldig — klik op ‘Sleutel’", false);
      return;
    }
    if(!ok){
      $("sections").innerHTML =
        '<p class="hint">Verzamelen lukte niet. Controleer de verbinding en klik opnieuw op <strong>Genereer krant</strong>.</p>';
      setStatus("Mislukt — probeer opnieuw", false);
      return;
    }
    laatste = krant;
    render(krant, today);
    setStatus("Klaar — "+nowNL(), false);
  }

  async function fetchSection(s, today, sleutel){
    const system =
`Je bent eindredacteur van een Nederlandstalige krant met UITSLUITEND positief, opbeurend en constructief nieuws. Géén rampen, misdaad, ongelukken, oorlog of negatieve politiek. Zoek met de zoekfunctie naar nieuws van de afgelopen 7 dagen over de opgegeven regio en kies de meest concrete, positieve berichten. Gebruik UITSLUITEND berichten met een publicatiedatum binnen 7 dagen vóór de datum van vandaag; laat alles wat ouder is weg. Schrijf in vlot, helder Nederlands.

Antwoord UITSLUITEND in dit platte-tekstformaat. Geen inleiding, geen markdown, geen aanhalingstekens rond de waarden:

@@ITEM
kop: pakkende kop op één regel
bron: naam van de bron
datum: YYYY-MM-DD of leeg
tekst: een volledig, uitgewerkt nieuwsbericht van 7 tot 10 zinnen (ongeveer 140-190 woorden), alles op één regel
@@ITEM
(volgende bericht, dezelfde velden)

Geef ${s.count} berichten. Voeg verder niets toe.`;

    const user =
`Sectie: ${s.label} — ${s.scope}.
Voorkeursbronnen: ${SOURCE_HINTS[s.key]}.
Datum vandaag: ${today}.
Zoek en geef ${s.count} positieve berichten van de afgelopen 7 dagen in het afgesproken formaat.`;

    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key": sleutel,
        "anthropic-version":"2023-06-01",
        // Vereist om de Anthropic-API rechtstreeks vanuit de browser te mogen aanroepen.
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:3000,
        system:system,
        messages:[{role:"user",content:user}],
        tools:[{type:"web_search_20250305",name:"web_search"}]
      })
    });
    if(!res.ok){
      const err = new Error("HTTP "+res.status);
      if(res.status === 401 || res.status === 403) err.auth = true;
      throw err;
    }
    const data = await res.json();
    const text = (data.content||[])
      .filter(b => b.type === "text")
      .map(b => b.text).join("\n");
    return parseItems(text).filter(it => isRecent(it.datum));
  }

  // Parses @@ITEM blocks for one section. Quote-proof: values read line-by-line.
  function parseItems(text){
    const items = [];
    let item=null, field=null;
    const flush = () => { if(item && (item.kop || item.samenvatting)) items.push(item); item=null; field=null; };
    for(const raw of (text||"").split(/\r?\n/)){
      const line = raw.trim();
      if(/^@@ITEM\b/i.test(line)){ flush(); item={kop:"",bron:"",datum:"",samenvatting:""}; continue; }
      if(/^@@/.test(line)) continue;              // ignore any other @@ markers
      if(!item) continue;
      let m;
      if((m = line.match(/^kop:\s*(.*)$/i)))        { item.kop = m[1]; field="kop"; }
      else if((m = line.match(/^bron:\s*(.*)$/i)))  { item.bron = clean(m[1]); field="bron"; }
      else if((m = line.match(/^datum:\s*(.*)$/i))) { item.datum = clean(m[1]); field="datum"; }
      else if((m = line.match(/^tekst:\s*(.*)$/i))) { item.samenvatting = m[1]; field="samenvatting"; }
      else if(field && line){ item[field] += " " + line; }  // wrapped-line continuation
    }
    flush();
    return items;
  }
  function clean(v){
    v = (v||"").trim();
    return /^(leeg|onbekend|n\.?v\.?t\.?)$/i.test(v) ? "" : v;
  }
  function isRecent(d){               // houd alleen berichten van max ~7 dagen oud
    if(!d) return true;              // geen datum → vertrouw de selectie van het model
    const t = new Date(d);
    if(isNaN(t)) return true;
    return (Date.now() - t.getTime()) / 86400000 <= 7.5;
  }

  /* ====== Render ====== */
  function esc(x){
    return String(x==null?"":x)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  function fmtDate(d){
    if(!d) return "";
    const t = new Date(d);
    if(isNaN(t)) return "";
    return t.toLocaleDateString("nl-NL",{day:"numeric",month:"short"});
  }

  function render(krant, today){
    $("nameplate").textContent = TITLE;
    $("tagline").textContent   = TAGLINE;
    $("edition").textContent   = "Editie "+PLACE;
    $("date").textContent      = editieDatum ? longNL(editieDatum) : nowNL();

    let html = "";
    for(const sec of SECTIONS){
      const items = Array.isArray(krant[sec.key]) ? krant[sec.key] : [];
      html += '<section class="sec">';
      const kick = sec.sub ? sec.label + ", " + sec.sub : sec.label;
      html +=   '<div class="kicker">'+
                  '<span class="k-label">'+esc(kick)+'</span>'+
                  '<span class="k-rule"></span>'+
                '</div>';
      if(!items.length){
        html += '<p class="empty">Vandaag geen goed nieuws gevonden voor deze rubriek.</p>';
      }else{
        html += '<div class="items">';
        items.forEach((it,i) => {
          const meta = [esc(it.bron), fmtDate(it.datum)].filter(Boolean).join(" · ");
          html += '<article class="item'+(i===0?' lead':'')+'">'+
                    '<h2>'+esc(it.kop)+'</h2>'+
                    (meta ? '<div class="meta">'+meta+'</div>' : '')+
                    '<p>'+esc(it.samenvatting)+'</p>'+
                  '</article>';
        });
        html += '</div>';
      }
      html += '</section>';
    }
    $("sections").innerHTML = html;
  }

  /* ====== Kopieer naar klembord (werkt ook op mobiel) ====== */
  function krantAsText(){
    const out = [];
    out.push(TITLE.toUpperCase()+" — "+TAGLINE);
    out.push("Editie "+PLACE+" · "+(editieDatum ? longNL(editieDatum) : nowNL()));
    out.push("");
    for(const sec of SECTIONS){
      const items = (laatste && laatste[sec.key]) || [];
      if(!items.length) continue;
      out.push((sec.sub ? sec.label+", "+sec.sub : sec.label).toUpperCase());
      out.push("");
      items.forEach(it => {
        if(it.kop) out.push(it.kop);
        const meta = [it.bron, fmtDate(it.datum)].filter(Boolean).join(" · ");
        if(meta) out.push(meta);
        if(it.samenvatting) out.push(it.samenvatting);
        out.push("");
      });
    }
    return out.join("\n").trim();
  }
  function kopieer(){
    if(!laatste){ flash("Genereer eerst de krant"); return; }
    const txt = krantAsText();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(() => flash("Gekopieerd"), () => fallbackCopy(txt));
    }else{
      fallbackCopy(txt);
    }
  }
  function fallbackCopy(txt){
    const ta = document.createElement("textarea");
    ta.value = txt; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    let ok = false;
    try { ok = document.execCommand("copy"); } catch(e){}
    document.body.removeChild(ta);
    flash(ok ? "Gekopieerd" : "Kopiëren lukt hier niet");
  }

  /* ====== Export naar PDF (best-effort; werkt waar downloads zijn toegestaan) ====== */
  async function exportPDF(){
    if(!laatste){ flash("Genereer eerst de krant"); return; }
    if(typeof html2pdf === "undefined"){ flash("PDF-functie niet geladen"); return; }
    setBusy(true); flash("PDF maken…");
    try{
      if(document.fonts && document.fonts.ready) await document.fonts.ready;
      document.body.classList.add("exporting");
      const opt = {
        margin: 10,
        filename: "de-zonzijde-"+new Date().toISOString().slice(0,10)+".pdf",
        image: { type:"jpeg", quality:0.96 },
        html2canvas: { scale: 2, useCORS: true, backgroundColor:"#FAF9F6" },
        jsPDF: { unit:"mm", format:"a4", orientation:"portrait" },
        pagebreak: { mode:["css","legacy"], avoid:".item" }
      };
      await html2pdf().set(opt).from($("paper")).save();
      flash("PDF opgeslagen");
    }catch(e){
      console.error(e);
      flash("PDF maken lukte niet");
    }finally{
      document.body.classList.remove("exporting");
      setBusy(false);
    }
  }

  // Toon meteen de vaste editie (Wijchen, zondag 28 juni 2026).
  editieDatum = PRELOAD_DATE;
  laatste = PRELOAD;
  render(PRELOAD, PRELOAD_DATE);
  setStatus("Editie "+longNL(PRELOAD_DATE), false);
</script>
