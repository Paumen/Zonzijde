<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>De Zonzijde — goed nieuws</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,560;9..144,640&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Archivo:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root{
    --paper:#FAF9F6;
    --desk:#ECEAE3;
    --ink:#1B1B17;
    --muted:#6B6A61;
    --hair:#D6D4CB;
    --spot:#356B4B;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--desk);
    color:var(--ink);
    font-family:"Newsreader",Georgia,serif;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Toolbar (screen only) ---------- */
  .toolbar{
    position:sticky;top:0;z-index:10;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:7px 12px;
    background:rgba(250,249,246,.92);
    backdrop-filter:saturate(1.2) blur(4px);
    border-bottom:1px solid var(--hair);
    font-family:"Archivo",system-ui,sans-serif;font-size:12px;
  }
  .toolbar .brand{font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--spot)}
  .toolbar .grow{flex:1}
  .toolbar .status{color:var(--muted)}
  button{
    font-family:"Archivo",system-ui,sans-serif;font-size:12px;font-weight:600;
    letter-spacing:.02em;
    padding:5px 11px;border:1px solid var(--ink);border-radius:0;
    background:var(--paper);color:var(--ink);cursor:pointer;
  }
  button:hover{background:var(--ink);color:var(--paper)}
  button:disabled{opacity:.5;cursor:default}
  button:focus-visible{outline:2px solid var(--spot);outline-offset:2px}
  .spin{
    width:11px;height:11px;border:2px solid var(--hair);border-top-color:var(--spot);
    border-radius:50%;display:inline-block;vertical-align:-1px;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.spin{animation:none}}

  /* ---------- Paper ---------- */
  #paper{
    width:210mm;max-width:100%;margin:14px auto 40px;
    background:var(--paper);
    padding:11mm 12mm 14mm;
    box-shadow:0 1px 0 rgba(0,0,0,.04),0 12px 28px rgba(0,0,0,.10);
  }

  /* ---------- Masthead ---------- */
  #masthead{text-align:center;margin-bottom:3mm}
  .mh-top{
    display:flex;justify-content:space-between;align-items:flex-end;
    font-family:"Archivo",sans-serif;font-size:10px;text-transform:uppercase;
    letter-spacing:.14em;color:var(--muted);
    border-bottom:1px solid var(--ink);padding-bottom:3px;
  }
  #nameplate{
    font-family:"Fraunces",serif;font-weight:640;font-optical-sizing:auto;
    font-size:clamp(34px,7vw,52px);line-height:.95;margin:6px 0 4px;
    letter-spacing:.005em;
  }
  .mh-sub{
    font-family:"Archivo",sans-serif;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink);
    border-top:2px solid var(--spot);border-bottom:1px solid var(--ink);
    padding:4px 0;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;
  }
  .mh-sub .dot{color:var(--spot)}

  /* ---------- Sections ---------- */
  .sec{margin-top:6mm;padding-top:3mm;border-top:1px solid var(--hair)}
  .sec:first-of-type{border-top:none;padding-top:0;margin-top:0}
  .kicker{display:flex;align-items:baseline;gap:8px;margin-bottom:3mm}
  .k-label{
    font-family:"Archivo",sans-serif;font-weight:700;font-size:13px;
    text-transform:uppercase;letter-spacing:.13em;color:var(--spot);
  }
  .k-sub{font-family:"Newsreader",serif;font-style:italic;font-size:12px;color:var(--muted)}
  .k-rule{flex:1;height:1px;background:var(--ink);align-self:center}

  .items{column-width:56mm;column-gap:6mm}
  .item{break-inside:avoid;margin:0 0 3.6mm;padding-bottom:3.2mm;border-bottom:1px solid var(--hair)}
  .item:last-child{border-bottom:none}
  .item h2{
    font-family:"Fraunces",serif;font-weight:560;font-size:14.5px;line-height:1.18;
    margin:0 0 2px;
  }
  .item .meta{
    font-family:"Archivo",sans-serif;font-size:9.5px;text-transform:uppercase;
    letter-spacing:.07em;color:var(--muted);margin-bottom:3px;
  }
  .item p{font-size:12.5px;line-height:1.45;margin:0;color:#28281f;text-align:justify;hyphens:auto;-webkit-hyphens:auto}

  .item.lead{column-span:all;border-bottom:1.5px solid var(--ink);margin-bottom:3.5mm;padding-bottom:3mm}
  .item.lead h2{font-size:clamp(19px,2.4vw,24px);line-height:1.12;font-weight:640;margin-bottom:3px}
  .item.lead p{font-size:13.5px;line-height:1.42;text-align:justify}

  /* Clean single column while exporting to PDF (html2canvas handles multicol poorly) */
  .exporting #paper{box-shadow:none}
  .exporting .items{column-width:auto;column-count:1}
  .exporting .item.lead{column-span:none}

  /* ---------- Weer (7-daagse) ---------- */
  #weer:empty{display:none}
  #weer{break-before:page}   /* op print/PDF: begin op een nieuwe pagina */
  .wx{display:flex;gap:2mm}
  .wx-day{
    flex:1 1 0;min-width:0;text-align:center;
    border:1px solid var(--hair);background:#fff;padding:3mm 1mm 2.5mm;
  }
  .wx-day.today{border:1.5px solid var(--spot)}
  .wx-day .wd{
    font-family:"Archivo",sans-serif;font-size:9.5px;font-weight:600;
    text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
  }
  .wx-day.today .wd{color:var(--spot)}
  .wx-day .ic{font-size:21px;line-height:1.25;margin:3px 0}
  .wx-day .tmax{font-family:"Fraunces",serif;font-weight:560;font-size:14px}
  .wx-day .tmin{font-family:"Fraunces",serif;font-size:11.5px;color:var(--muted);margin-left:2px}
  .wx-day .pp{font-family:"Archivo",sans-serif;font-size:8.5px;color:var(--spot);margin-top:1px}
  .wx-cap{
    font-family:"Archivo",sans-serif;font-size:8.5px;color:var(--muted);
    text-align:right;margin-top:1.5mm;text-transform:uppercase;letter-spacing:.05em;
  }
  @media (max-width:520px){
    .wx{flex-wrap:wrap}
    .wx-day{flex:1 1 21%}
  }

  .empty{font-family:"Newsreader",serif;font-style:italic;color:var(--muted);font-size:12.5px}
  .hint{
    text-align:center;color:var(--muted);font-style:italic;font-size:13px;
    padding:12mm 4mm;
  }

  /* ---------- Print ---------- */
  @page{size:A4;margin:13mm}
  @media print{
    body{background:#fff}
    .toolbar{display:none}
    #paper{width:auto;max-width:none;margin:0;padding:0;box-shadow:none}
    .item{break-inside:avoid}
  }

  @media (max-width:520px){
    #paper{padding:14px;margin:8px auto 30px}
  }
</style>
</head>

    stad: [
      { kop:"Vrijwilliger Vincent Veltmaat krijgt Zilveren Draagspeld voor reddingsboei Bergharen",
        bron:"wijchen.nl", datum:"2026-06-25",
        samenvatting:"Tijdens de officiële opening van Buurtmarkt Blije Bikkels in Bergharen heeft burgemeester Renske Helmer-Englebert de Zilveren Draagspeld van de gemeente Wijchen uitgereikt aan Vincent Veltmaat. Hij ontving deze gemeentelijke onderscheiding als blijk van grote waardering voor zijn uitzonderlijke inzet voor de leefbaarheid van Bergharen. Na het sluiten van de supermarkt in 2020 en het verdwijnen van de laatste winkel in 2022 kwam de leefbaarheid van Bergharen onder druk te staan, maar het leegstaande pand bood kansen. Dankzij de inzet van vele vrijwilligers en betrokken inwoners is Buurtmarkt Blije Bikkels nu een nieuwe ontmoetingsplek voor Bergharen, Hernen en Leur. In het voormalige winkelpand werd uiteindelijk Buurtmarkt Blije Bikkels gerealiseerd, die inmiddels fungeert als winkel én ontmoetingsplek voor inwoners van de drie dorpen. Vincent Veltmaat speelde een centrale rol bij het tot stand komen van de buurtmarkt; als vrijwilliger en projectleider zette hij zich de afgelopen zes jaar vrijwel dagelijks in voor het project. De onderscheiding is een mooie bekroning voor jaren van doorzetten en samenwerken. Bergharen heeft met de buurtmarkt een bruisend hart teruggekregen, en de gemeente laat met deze eerbewijzing zien hoe ze lokale betrokkenheid en gemeenschapszin waardeert." },

        samenvatting:"De Wijchense Berg in Alverna, ooit een gesloten stortplaats, staat aan de vooravond van een nieuwe toekomst als openbaar recreatiegebied. De gemeente Wijchen heeft gekozen voor een uitgebreide aanpak waarbij de voormalige stortplaats niet alleen veiliger wordt gemaakt, maar ook geschikt blijft voor wandelaars en mountainbikers. Het college koos daarbij voor het meest ambitieuze van drie onderzochte scenario's. Zodra de werkzaamheden zijn afgerond, kan iedereen er weer veilig terecht. Wandelaars kunnen dan boven op de berg genieten van het uitzicht over de omgeving, terwijl mountainbikers optimaal gebruik kunnen maken van de hoogteverschillen. De gemeente benadrukt dat veiligheid en gezondheid daarbij altijd vooropstaan: er wordt zorgvuldig gemeten en onderzocht voor er ook maar iets gebeurt. Een plek die jarenlang gesloten was, wordt zo omgetoverd tot een uitnodigende groene long die mensen samenbrengt. De aanpak past in de bredere ambitie van Wijchen om de openbare ruimte levendig, veilig en toegankelijk te houden voor alle inwoners." },

        bron:"Rijksoverheid / NS", datum:"2026-06-22",
        samenvatting:"Het tijdelijke zomerabonnement ‘Nederland Dal Vrij Trein’ is een groot succes gebleken. Sinds de lancering op 15 juni kunnen reizigers voor slechts €49 per maand onbeperkt reizen in de daluren en weekenden, bij alle binnenlandse treinvervoerders. Normaal kost het vergelijkbare NS Flex Dal Vrij-abonnement €127,95 per maand, dus de korting is aanzienlijk. De belangstelling was op de eerste dag zo groot dat de website van NS overbelast raakte en tijdelijk niet bereikbaar was. Het kabinet stelt in totaal €118 miljoen beschikbaar voor deze maatregel, die bedoeld is als compensatie voor de hoge brandstofprijzen en mensen moet verleiden vaker de trein te pakken. Staatssecretaris Annet Bertram noemde het abonnement “een prachtige kans om kennis te maken met de trein en dan de auto een keer te laten staan.” Kinderen tot en met 11 jaar reizen gratis mee via het Kids Vrij-abonnement. Het abonnement is geldig tot en met 31 augustus en maandelijks opzegbaar. Wie het voor 1 juli afsluit, profiteert twee volle maanden van het lage tarief." },

        samenvatting:"Miljoenen gepensioneerden in Nederland mogen zich verheugen op een hogere AOW-uitkering. Per 1 juli 2026 stijgt de AOW met 1,5 procent, zo heeft de Sociale Verzekeringsbank bekendgemaakt. Alleenstaande AOW-gerechtigden gaan er €24,59 bruto per maand op vooruit en ontvangen voortaan €1.662,16 bruto per maand. Netto komt dat, met loonheffingskorting, neer op €1.581,55 per maand. Gehuwden en samenwonenden ontvangen per persoon €17,27 bruto extra, wat neerkomt op €1.139,39 bruto per maand. De verhoging hangt samen met de stijging van het wettelijk minimumloon, dat per 1 juli stijgt van €14,71 naar €14,99 bruto per uur. De AOW is wettelijk aan dit minimumloon gekoppeld, zodat gepensioneerden niet achterblijven bij de loonontwikkeling. Op jaarbasis betekent de verhoging voor alleenstaanden ruim €295 extra netto. De verhoogde bedragen worden voor het eerst uitbetaald op 23 juli 2026. Goed nieuws ook: de Zvw-bijdrage daalde dit jaar al van 5,26 naar 4,85 procent, waardoor gepensioneerden netto extra voordeel ondervinden." }

      { kop:"Wereldwijde bloeddonaties stijgen met bijna twintig procent dankzij vrijwilligers",
        bron:"Positive News", datum:"2026-06-26",
        samenvatting:"Het aantal bloeddonaties wereldwijd is in tien jaar tijd met bijna een vijfde gestegen, zo blijkt uit nieuwe cijfers van de Wereldgezondheidsorganisatie (WHO). Uit data verzameld in 132 landen blijkt dat de mondiale bloedafname tussen 2013 en 2023 met bijna 19 procent toenam. Meer dan 85 procent van de geschatte 120 miljoen donaties in 2023 was afkomstig van onbetaalde vrijwilligers. WHO-directeur-generaal Tedros Adhanom Ghebreyesus noemde de cijfers “bemoedigende vooruitgang”. De stijging is een rechtstreeks gevolg van groeiende bewustwording en succesvolle campagnes om burgers aan te sporen bloed te doneren. Steeds meer landen slagen erin een betrouwbaar netwerk van vrijwillige donoren op te bouwen. Bloed is een onmisbaar onderdeel van de gezondheidszorg, van operaties tot de behandeling van bloedarmoede en kanker. De groei laat zien dat solidariteit wereldwijd leeft en dat mensen bereid zijn anderen te helpen, zonder daar iets voor terug te verwachten." }
    ]
  };

  /* ====== Weer — 7-daagse voorspelling (Open-Meteo, geen sleutel nodig) ====== */
  const WEER = { lat:51.8126, lon:5.7292, plaats:"Wijchen" };
  // WMO-weercodes → pictogram + Nederlandse omschrijving.
  function wmo(code){
    const m = {
      0:["☀️","Onbewolkt"], 1:["🌤️","Overwegend zonnig"], 2:["⛅","Half bewolkt"], 3:["☁️","Bewolkt"],
      45:["🌫️","Mist"], 48:["🌫️","Aanvriezende mist"],
      51:["🌦️","Lichte motregen"], 53:["🌦️","Motregen"], 55:["🌦️","Dichte motregen"],
      56:["🌧️","Lichte ijzel"], 57:["🌧️","IJzel"],
      61:["🌧️","Lichte regen"], 63:["🌧️","Regen"], 65:["🌧️","Zware regen"],
      66:["🌧️","Lichte ijzel"], 67:["🌧️","IJzel"],
      71:["🌨️","Lichte sneeuw"], 73:["🌨️","Sneeuw"], 75:["🌨️","Zware sneeuw"], 77:["🌨️","Sneeuwkorrels"],
      80:["🌦️","Lichte buien"], 81:["🌦️","Buien"], 82:["⛈️","Zware buien"],
      85:["🌨️","Sneeuwbuien"], 86:["🌨️","Sneeuwbuien"],
      95:["⛈️","Onweer"], 96:["⛈️","Onweer met hagel"], 99:["⛈️","Zwaar onweer"]
    };
    return m[code] || ["•",""];
  }
  async function laadWeer(){
    const el = document.getElementById("weer");
    if(!el) return;
    try{
      const u = "https://api.open-meteo.com/v1/forecast?latitude="+WEER.lat+"&longitude="+WEER.lon+
        "&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max"+
        "&timezone=Europe%2FAmsterdam&forecast_days=7";
      const r = await fetch(u);
      if(!r.ok) throw new Error("HTTP "+r.status);
      tekenWeer((await r.json()).daily);
    }catch(e){
      console.error("weer", e);
      el.className = ""; el.innerHTML = "";          // stil falen: geen weerbalk
    }
  }
  function tekenWeer(day){
    const el = document.getElementById("weer");
    if(!el || !day || !Array.isArray(day.time) || !Array.isArray(day.weathercode)
       || !Array.isArray(day.temperature_2m_max) || !Array.isArray(day.temperature_2m_min)
       || !Array.isArray(day.precipitation_probability_max)) return;
    {
      let cards = "";
      for(let i=0; i<day.time.length; i++){
        const t  = new Date(day.time[i]);           // YYYY-MM-DD → UTC; weekdag in UTC
        const wd = i===0 ? "Vandaag"
                         : (isNaN(t) ? "—" : t.toLocaleDateString("nl-NL",{weekday:"short",timeZone:"UTC"}));
        const [ic,lbl] = wmo(day.weathercode[i]);
        const mx = Math.round(day.temperature_2m_max[i]);
        const mn = Math.round(day.temperature_2m_min[i]);
        const pp = day.precipitation_probability_max[i];
        cards += '<div class="wx-day'+(i===0?' today':'')+'" title="'+esc(lbl)+'">'+
                   '<div class="wd">'+esc(wd)+'</div>'+
                   '<div class="ic">'+ic+'</div>'+
                   '<div><span class="tmax">'+mx+'°</span><span class="tmin">'+mn+'°</span></div>'+
                   (pp!=null ? '<div class="pp">'+pp+'%</div>' : '')+
                 '</div>';
      }
      el.className = "sec";
      el.innerHTML =
        '<div class="kicker">'+
          '<span class="k-label">Weer</span>'+
          '<span class="k-sub">'+esc(WEER.plaats)+' — vandaag en de komende 6 dagen</span>'+
          '<span class="k-rule"></span>'+
        '</div>'+
        '<div class="wx">'+cards+'</div>'+
        '<div class="wx-cap">Max./min. temperatuur · neerslagkans · bron Open-Meteo</div>';
    }
  }

  /* ====== UI helpers ====== */
  const $ = id => document.getElementById(id);
  function nowNL(){
    return new Date().toLocaleDateString("nl-NL",
      {weekday:"long",day:"numeric",month:"long",year:"numeric"});
  }
  function longNL(d){               // "zondag 28 juni 2026" voor een vaste datum
    const t = new Date(d);
    if(isNaN(t)) return nowNL();
    // YYYY-MM-DD wordt als UTC-middernacht geparsed; forceer UTC zodat de
    // dag niet verschuift in negatieve tijdzones (bv. Amerika).
    return t.toLocaleDateString("nl-NL",
      {weekday:"long",day:"numeric",month:"long",year:"numeric",timeZone:"UTC"});
  }
  let editieDatum = null;          // gezet bij een vaste editie, anders vandaag
  function setBusy(b){
    ["gen","pdf","prn","cpy"].forEach(id => { const el = $(id); if(el) el.disabled = b; });
  }
  function setStatus(txt, busy){
    $("status").innerHTML = (busy ? '<span class="spin"></span> ' : '') + txt;
    setBusy(busy);
  }
  let laatste = null;                          // laatst gegenereerde krant (voor Kopieer)
  function flash(msg){
    const s = $("status"); const prev = s.textContent;
    s.textContent = msg;
    setTimeout(() => { if(s.textContent === msg) s.textContent = prev; }, 1800);
  }

  /* ====== API-sleutel (alleen in deze browser opgeslagen) ======
     Deze pagina draait statisch (GitHub Pages) en heeft geen server.
     De Anthropic-sleutel wordt daarom lokaal in de browser bewaard
     (localStorage) en nooit in de repository opgeslagen. */
  const SLEUTEL_KEY = "zonzijde_anthropic_key";
  function getSleutel(){ return localStorage.getItem(SLEUTEL_KEY) || ""; }
  function vraagSleutel(){
    const huidig = getSleutel();
    const inv = prompt(
      "Plak je Anthropic API-sleutel (begint met sk-ant-…).\n" +
      "Wordt alleen in deze browser bewaard, niet online.",
      huidig);
    if(inv === null) return getSleutel();          // geannuleerd → laat staan
    const k = inv.trim();
    if(k) localStorage.setItem(SLEUTEL_KEY, k);
    else  localStorage.removeItem(SLEUTEL_KEY);     // leeg → wissen
    return k;
  }
  function stelSleutelIn(){
    const k = vraagSleutel();
    flash(k ? "Sleutel opgeslagen" : "Sleutel gewist");
  }

  /* ====== Generate — one call per section, sequential + retry ====== */
  async function genereer(){
    let sleutel = getSleutel();
    if(!sleutel) sleutel = vraagSleutel();
    if(!sleutel){
      setStatus("Geen API-sleutel — klik op ‘Sleutel’", false);
      return;
    }
    editieDatum = null;                            // verse editie → datum van vandaag
    const today = new Date().toISOString().slice(0,10);
    const krant = {stad:[],regio:[],land:[],wereld:[]};
    let ok = false;
    let authFout = false;                          // 401/403 → sleutel klopt niet

    // Parallel liep tegen rate limits aan (lege secties); daarom één voor één.
    for(let i=0; i<SECTIONS.length; i++){
      const s = SECTIONS[i];
      setStatus("Verzamelen… "+s.label+" ("+(i+1)+"/"+SECTIONS.length+")", true);
      let items = [];
      try { items = await fetchSection(s, today, sleutel); }
      catch(e){ console.error(s.key, e); if(e && e.auth) authFout = true; }
      if(!items.length && !authFout){             // één herkansing bij leeg of fout
        try { items = await fetchSection(s, today, sleutel); }
        catch(e){ console.error(s.key+" (herkansing)", e); if(e && e.auth) authFout = true; }
      }
      krant[s.key] = items;
      if(items.length) ok = true;
      if(authFout) break;                          // geen zin om door te gaan
    }

    if(authFout){
      $("sections").innerHTML =
        '<p class="hint">De API-sleutel werd geweigerd. Klik op <strong>Sleutel</strong> en plak een geldige Anthropic-sleutel (sk-ant-…).</p>';
      setStatus("Sleutel ongeldig — klik op ‘Sleutel’", false);
      return;
    }
    if(!ok){
      $("sections").innerHTML =
        '<p class="hint">Verzamelen lukte niet. Controleer de verbinding en klik opnieuw op <strong>Genereer krant</strong>.</p>';
      setStatus("Mislukt — probeer opnieuw", false);
      return;
    }
    laatste = krant;
    render(krant, today);
    setStatus("Klaar — "+nowNL(), false);
  }

  async function fetchSection(s, today, sleutel){
    const system =
`Je bent eindredacteur van een Nederlandstalige krant met UITSLUITEND positief, opbeurend en constructief nieuws. Géén rampen, misdaad, ongelukken, oorlog of negatieve politiek. Zoek met de zoekfunctie naar nieuws van de afgelopen 7 dagen over de opgegeven regio en kies de meest concrete, positieve berichten. Gebruik UITSLUITEND berichten met een publicatiedatum binnen 7 dagen vóór de datum van vandaag; laat alles wat ouder is weg. Schrijf in vlot, helder Nederlands.

Antwoord UITSLUITEND in dit platte-tekstformaat. Geen inleiding, geen markdown, geen aanhalingstekens rond de waarden:

@@ITEM
kop: pakkende kop op één regel
bron: naam van de bron
datum: YYYY-MM-DD of leeg
tekst: een volledig, uitgewerkt nieuwsbericht van 7 tot 10 zinnen (ongeveer 140-190 woorden), alles op één regel
@@ITEM
(volgende bericht, dezelfde velden)

Geef ${s.count} berichten. Voeg verder niets toe.`;

    const user =
`Sectie: ${s.label} — ${s.scope}.
Voorkeursbronnen: ${SOURCE_HINTS[s.key]}.
Datum vandaag: ${today}.
Zoek en geef ${s.count} positieve berichten van de afgelopen 7 dagen in het afgesproken formaat.`;

    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key": sleutel,
        "anthropic-version":"2023-06-01",
        // Vereist om de Anthropic-API rechtstreeks vanuit de browser te mogen aanroepen.
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:3000,
        system:system,
        messages:[{role:"user",content:user}],
        tools:[{type:"web_search_20250305",name:"web_search"}]
      })
    });
    if(!res.ok){
      const err = new Error("HTTP "+res.status);
      if(res.status === 401 || res.status === 403) err.auth = true;
      throw err;
    }
    const data = await res.json();
    const text = (data.content||[])
      .filter(b => b.type === "text")
      .map(b => b.text).join("\n");
    return parseItems(text).filter(it => isRecent(it.datum));
  }

  // Parses @@ITEM blocks for one section. Quote-proof: values read line-by-line.
  function parseItems(text){
    const items = [];
    let item=null, field=null;
    const flush = () => { if(item && (item.kop || item.samenvatting)) items.push(item); item=null; field=null; };
    for(const raw of (text||"").split(/\r?\n/)){
      const line = raw.trim();
      if(/^@@ITEM\b/i.test(line)){ flush(); item={kop:"",bron:"",datum:"",samenvatting:""}; continue; }
      if(/^@@/.test(line)) continue;              // ignore any other @@ markers
      if(!item) continue;
      let m;
      if((m = line.match(/^kop:\s*(.*)$/i)))        { item.kop = m[1]; field="kop"; }
      else if((m = line.match(/^bron:\s*(.*)$/i)))  { item.bron = clean(m[1]); field="bron"; }
      else if((m = line.match(/^datum:\s*(.*)$/i))) { item.datum = clean(m[1]); field="datum"; }
      else if((m = line.match(/^tekst:\s*(.*)$/i))) { item.samenvatting = m[1]; field="samenvatting"; }
      else if(field && line){ item[field] += " " + line; }  // wrapped-line continuation
    }
    flush();
    return items;
  }
  function clean(v){
    v = (v||"").trim();
    return /^(leeg|onbekend|n\.?v\.?t\.?)$/i.test(v) ? "" : v;
  }
  function isRecent(d){               // houd alleen berichten van max ~7 dagen oud
    if(!d) return true;              // geen datum → vertrouw de selectie van het model
    const t = new Date(d);
    if(isNaN(t)) return true;
    return (Date.now() - t.getTime()) / 86400000 <= 7.5;
  }

  /* ====== Render ====== */
  function esc(x){
    return String(x==null?"":x)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  function fmtDate(d){
    if(!d) return "";
    const t = new Date(d);
    if(isNaN(t)) return "";
    // UTC forceren zodat de dag niet verschuift in negatieve tijdzones.
    return t.toLocaleDateString("nl-NL",{day:"numeric",month:"short",timeZone:"UTC"});
  }

  function render(krant, today){
    $("nameplate").textContent = TITLE;
    $("tagline").textContent   = TAGLINE;
    $("edition").textContent   = "Editie "+PLACE;
    $("date").textContent      = editieDatum ? longNL(editieDatum) : nowNL();

    let html = "";
    SECTIONS.forEach((sec, idx) => {
      const items = Array.isArray(krant[sec.key]) ? krant[sec.key] : [];
      html += '<section class="sec">';
      const kick = sec.sub ? sec.label + ", " + sec.sub : sec.label;
      html +=   '<div class="kicker">'+
                  '<span class="k-label">'+esc(kick)+'</span>'+
                  '<span class="k-rule"></span>'+
                '</div>';
      if(!items.length){
        html += '<p class="empty">Vandaag geen goed nieuws gevonden voor deze rubriek.</p>';
      }else{
        html += '<div class="items">';
        items.forEach((it,i) => {
          const meta = [esc(it.bron), fmtDate(it.datum)].filter(Boolean).join(" · ");
          html += '<article class="item'+(i===0?' lead':'')+'">'+
                    '<h2>'+esc(it.kop)+'</h2>'+
                    (meta ? '<div class="meta">'+meta+'</div>' : '')+
                    '<p>'+esc(it.samenvatting)+'</p>'+
                  '</article>';
        });
        html += '</div>';
      }
      html += '</section>';
      // Weerbalk op pagina 2: na de eerste rubriek, vóór de rest.
      if(idx === 0) html += '<div id="weer"></div>';
    });
    $("sections").innerHTML = html;
    laadWeer();                        // (her)laad de 7-daagse verwachting
  }

  /* ====== Kopieer naar klembord (werkt ook op mobiel) ====== */
  function krantAsText(){
    const out = [];
    out.push(TITLE.toUpperCase()+" — "+TAGLINE);
    out.push("Editie "+PLACE+" · "+(editieDatum ? longNL(editieDatum) : nowNL()));
    out.push("");
    for(const sec of SECTIONS){
      const items = (laatste && laatste[sec.key]) || [];
      if(!items.length) continue;
      out.push((sec.sub ? sec.label+", "+sec.sub : sec.label).toUpperCase());
      out.push("");
      items.forEach(it => {
        if(it.kop) out.push(it.kop);
        const meta = [it.bron, fmtDate(it.datum)].filter(Boolean).join(" · ");
        if(meta) out.push(meta);
        if(it.samenvatting) out.push(it.samenvatting);
        out.push("");
      });
    }
    return out.join("\n").trim();
  }
  function kopieer(){
    if(!laatste){ flash("Genereer eerst de krant"); return; }
    const txt = krantAsText();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(() => flash("Gekopieerd"), () => fallbackCopy(txt));
    }else{
      fallbackCopy(txt);
    }
  }
  function fallbackCopy(txt){
    const ta = document.createElement("textarea");
    ta.value = txt; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    let ok = false;
    try { ok = document.execCommand("copy"); } catch(e){}
    document.body.removeChild(ta);
    flash(ok ? "Gekopieerd" : "Kopiëren lukt hier niet");
  }

  /* ====== Export naar PDF (best-effort; werkt waar downloads zijn toegestaan) ====== */
  async function exportPDF(){
    if(!laatste){ flash("Genereer eerst de krant"); return; }
    if(typeof html2pdf === "undefined"){ flash("PDF-functie niet geladen"); return; }
    setBusy(true); flash("PDF maken…");
    try{
      if(document.fonts && document.fonts.ready) await document.fonts.ready;
      document.body.classList.add("exporting");
      const opt = {
        margin: 10,
        filename: "de-zonzijde-"+new Date().toISOString().slice(0,10)+".pdf",
        image: { type:"jpeg", quality:0.96 },
        html2canvas: { scale: 2, useCORS: true, backgroundColor:"#FAF9F6" },
        jsPDF: { unit:"mm", format:"a4", orientation:"portrait" },
        pagebreak: { mode:["css","legacy"], avoid:".item" }
      };
      await html2pdf().set(opt).from($("paper")).save();
      flash("PDF opgeslagen");
    }catch(e){
      console.error(e);
      flash("PDF maken lukte niet");
    }finally{
      document.body.classList.remove("exporting");
      setBusy(false);
    }
  }

  // Toon meteen de vaste editie (Wijchen, zondag 28 juni 2026).
  editieDatum = PRELOAD_DATE;
  laatste = PRELOAD;
  render(PRELOAD, PRELOAD_DATE);     // rendert de krant én haalt het weer op
  setStatus("Editie "+longNL(PRELOAD_DATE), false);
</script>
</body>
</html>
