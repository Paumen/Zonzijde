

<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nieuws</title>
<style>
:root {
  --accent: oklch(50% .09 195);
  --tint: color-mix(in oklch, var(--accent) 10%, #fff);
  --neutral: oklch(86% .008 270);
  --muted: oklch(70% .01 270);
  --border: 1px solid var(--neutral);
  --radius: 4px;
  --inset: inset 0 2px 3px oklch(0% 0 0 / .18);
  --s: 3px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent }
body { margin: 0; padding: 3px; font: 11px system-ui, sans-serif }
input { display: none }

:is(button, label) {
  --down: 0px;
  --edge: calc(3px - var(--down));
  --ins: inset 0 0 #0000;
  font: inherit;
  padding: .15em .45em;
  background: none;
  border: var(--border);
  border-radius: var(--radius);
  translate: 0 var(--down);
  box-shadow: 0 var(--edge) 0 var(--neutral), var(--ins);
  transition: translate 90ms, box-shadow 90ms, background 90ms, color 90ms;
  user-select: none;
  cursor: pointer;
}
label { display: inline-grid; grid-template-areas: "t b"; align-items: center }
label::before { grid-area: t; content: attr(data-l) }
label::after { grid-area: t; content: attr(data-l); font-weight: 600; visibility: hidden }
label > span { grid-area: b; margin-left: 4px; font-size: 9px; opacity: .7 }
label:has(:checked) {
  --down: 2px;
  --ins: var(--inset);
  background: var(--tint);
  color: var(--accent);
}
label:has(:checked)::before { font-weight: 600 }
:is(button, label):active { --down: 3px; --ins: var(--inset) }
label:active { background: var(--tint) }
label[data-empty] { opacity: .4 }
button:disabled { color: var(--muted); cursor: default }
button[aria-busy="true"] {
  --down: 2px;
  --ins: var(--inset);
  pointer-events: none;
  color: var(--accent);
  background: linear-gradient(100deg,
    var(--tint) 40%,
    color-mix(in oklch, var(--accent) 3%, #fff) 50%,
    var(--tint) 60%) 200% 0 / 200% 100%;
  animation: key-shimmer 1.4s linear infinite;
}
@keyframes key-shimmer { to { background-position: -200% 0 } }

fieldset {
  margin: 0 0 4px;
  padding: var(--s) var(--s) calc(var(--s) + 3px);
  border: var(--border);
  border-radius: calc(var(--radius) + var(--s));
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}
div:has(> fieldset) { display: flex; gap: 4px; align-items: flex-start }

table { border-collapse: collapse; width: 100% }
th, td {
  padding: 2px 6px 2px 0;
  text-align: left;
  white-space: nowrap;
  border-bottom: 1px solid var(--neutral);
}
th { color: var(--muted); font-weight: 500; cursor: pointer }
a { color: inherit; text-decoration: none }
td[data-score] { background: var(--sc); text-align: center; padding: 2px 4px }
td[data-score="-2"] { --sc: oklch(86% 0.08 30) }
td[data-score="-1"] { --sc: oklch(93% 0.04 40) }
td[data-score="0"]  { --sc: color-mix(in oklch, var(--neutral), #fff 60%) }
td[data-score="1"]  { --sc: oklch(93% 0.05 145) }
td[data-score="2"]  { --sc: oklch(87% 0.09 148) }
</style>
</head>
<body>
<script>
function rijksUrl() {
  const to = new Date();
  const from = new Date(Date.now() - 7 * 864e5);
  const q = {
    filters: [
      { field: "content_type", values: ["pro:newsDocument"], type: "all" },
      { field: "sort_date", values: [{ to: to.toISOString(), from: from.toISOString(), name: "past007Days" }], type: "all" },
    ],
    resultSearchTerm: "", pageTitle: "Nieuws",
  };
  return "https://www.rijksoverheid.nl/api/rss?query=" + encodeURIComponent(JSON.stringify(q));
}

const SCOPES = [["L", "lokaal"], ["R", "regionaal"], ["N", "nationaal"], ["I", "internationaal"]];
const SCOPE_KEYS = SCOPES.map(([k, label]) => [k, label]);
const SCOPE_ORDER = SCOPES.map(([k]) => k);
const scopeOn = new Set(SCOPE_ORDER);

const SOURCE_DEFS = [
  ["Gem Wijchen", "https://www.wijchen.nl/feeds/2/laatste-nieuws-gemeente-wijchen.rss", ["L"]],
  ["nieuws.nl", "https://wijchen.nieuws.nl/feed/", ["L", "R"]],
  ["DG Wijchen", "https://www.gelderlander.nl/wijchen/rss.xml", ["L", "R", "N"]],
  ["Gld", "https://www.gld.nl/rss", ["R"]],
  ["Gld RvN", "https://www.gld.nl/rss/rijk-van-nijmegen.xml", ["L", "R"]],
  ["DG", "https://www.gelderlander.nl/home/rss.xml", ["N", "I"]],
  ["DG Binnen", "https://www.gelderlander.nl/binnenland/rss.xml", ["N"]],
  ["Overheid", rijksUrl(), ["N"]],
  ["NOS J", "https://feeds.nos.nl/jeugdjournaal", ["N", "I"]],
  ["NOS Alg", "https://feeds.nos.nl/nosnieuwsalgemeen", ["N", "I"]],
  ["NOS Binnen", "https://feeds.nos.nl/nosnieuwsbinnenland", ["N"]],
  ["NOS Buiten", "https://feeds.nos.nl/nosnieuwsbuitenland", ["I"]],
  ["NOS Econ", "https://feeds.nos.nl/nosnieuwseconomie", ["N", "I"]],
  ["NOS Sport", "https://feeds.nos.nl/nossportalgemeen", ["N"]],
  ["NOS Opm", "https://feeds.nos.nl/nosnieuwsopmerkelijk", ["N", "I"]],
  ["NOS Cultuur", "https://feeds.nos.nl/nosnieuwscultuurenmedia", ["N", "I"]],
  ["FTM", "https://ftm.nl/feed", ["N", "I"]],
  ["EW", "https://ewmagazine.nl/feed/", ["N", "I"]],
  ["HP", "https://www.hpdetijd.nl/rss", ["N"]],
  ["DW", "https://rss.dw.com/rdf/rss-en-top", ["I"]],
  ["DW Env", "https://rss.dw.com/xml/rss_en_environment", ["I"]],
  ["DW Science", "https://rss.dw.com/xml/rss_en_science", ["I"]],
  ["Positive", "https://www.positive.news/feed", ["I"]],
];

const relay = u => "https://proxy.corsfix.com/?" + u;
const CONCURRENCY = 6, TIMEOUT_MS = 15000;

const GKEY = "AIzaSyAKr58OxQlzP24kLf_PUFH1t0rQv521-GE";
const GBASE = "https://generativelanguage.googleapis.com/v1beta/models/";
const LLM_MODEL = "gemini-3.1-flash-lite";
const SCORE_BATCH = 80, SCORE_CONCURRENCY = 6;

const sources = SOURCE_DEFS.map(([short, url, scopes], id) => ({
  id, short, url, enabled: true,
  scopes: SCOPE_ORDER.filter(k => scopes.includes(k)),
}));
const scopesOf = i => sources[i.sourceId].scopes;

function el(tag, parent, text) {
  const n = document.createElement(tag);
  if (text != null) n.textContent = text;
  if (parent) parent.appendChild(n);
  return n;
}
const scopeG = el("fieldset", document.body);
const srcEl = el("fieldset", document.body);
const daysG = el("fieldset", document.body);
const scoreG = el("fieldset", document.body);
const rowShow = el("div", document.body);
const bktG = el("fieldset", rowShow);
const copyMdBtn = el("button", rowShow, "MD");
const scoreBtn = el("button", rowShow, "Scoor");
const colG = el("fieldset", document.body);
const out = el("div", document.body, "Laden\u2026");
const stripper = document.createElement("div");

let allItems = [];
let lastRows = [];
let loading = true;
const seenLinks = new Set();

const DAYS = 14;
const daysOn = new Set(Array.from({ length: DAYS }, (_, k) => k + 1));
const DAY_KEYS = Array.from({ length: DAYS }, (_, k) => [k + 1, `${k + 1}d`]);
const SCORE_KEYS = [
  ["-2", "−2"], ["-1", "−1"], ["0", "0"], ["1", "+1"], ["2", "+2"], ["none", "·"],
];
const scoreOn = new Set(SCORE_KEYS.map(([k]) => k));

const BUCKET1 = /overlij|overled|sterf|omgekomen|gedood|doodgeschoten|doodgestoken|doodgereden|doodreed|dode|moord|doodslag|neergeschoten|neergestoken|geweld(?!ig|enaar)|mishandel|aanrand|verkracht|wurg|ontvoer|gijzel|terreur|terroris|extremis|staatsgreep|steekpartij|steekincident|afpers|verniel|vuurwapen|gewapend|ongeval|aanrijding|verongelukt|neergestort|brand|overstroming|wateroverlast|aardbeving|verdronken|treinongeluk|gaslek|ravage|plofkraak|ingestort|watersnood|dader|arrestatie|gearresteerd|gevangenis|misdaad|misdrijf|crimineel|fraude|witwas|diefstal|gestolen|inbr|zedenzaak|kinderporno|mensenhandel|vervolging|misbruik|smokkel|gewond|trauma|aanslag|luchtaanval|raketaanval|failli|armoede|dakloze|betoging|rellen|relschop|staking|schandaal|sanctie|besmetting|giftig|quarantaine|lockdown|avondklok|asbest|noodweer|tornado|noodtoestand|antisemit|racis|genocide|aanklacht|fata(?:al|le)|misstand|intimid|bloedbad|voortvluchtig|beschuldig|(?<!k)ramp|(?<!\p{L})(?:cel|dood(?:s|elijk|steek|kist)?|wapen(?:s|en|ing)?|bom(?:men)?)(?!\p{L})/iu;
const BUCKET2 = /schiet|geslagen|(?<!ver)slaan|(?<!ver)slaat|overval|slachtoffer|vecht|liquidat|ongeluk|botsing|explosie|ontploff|instort|verwoest|ontruimd|evacu|crash|aardverschuiving|verdachte|aangehouden|aanhouding|opgepakt|(?<!op)gevangen|oplicht|corrupt|drugs|inbraak|stelen|steelt|spion|vermist|straf|veroordeel|levenslang|ambulance|oorlog|aanval|offensief|bombardement|crisis|escalatie|ontslag|schrap|bezuinig|tekort|inflatie|schade|claim|verlies|krimp|werkloos|protest|boycot|opstand|onrust|overlast|ophef|dreig|conflict|waarschuw|ruzie|kritiek|kritisch|uitbraak|virus|vervuil|orkaan|droogte|gevaar|paniek|woede|drama|blunder|somber|schok|discriminat|wraak|vete|aangifte|(?<!g)leed|hekel|dupe(?:er|re)|agress|storing|nabestaande|misleid|(?<!\p{L})(?:rouw\p{L}*|mes(?:sen|steek|wond)?|rel(?:len)?|ziek(?:te|en|melding|enhuis)?|boos(?:aardig|heid)?|angst(?:ig|aanjagend|vallig)?)(?!\p{L})/iu;
const BUCKET3 = /(?<!\p{L})(?:dead|deadly|death(?:s)?|died|dies|fatal(?:ly|ity|ities)?|deceased|murder(?:ed|s|er|ers)?|kill(?:ed|ing|er|ers|s)?|homicide(?:s)?|manslaughter|gunman|weapon(?:s|ized)?|firearm(?:s)?|gunshot(?:s)?|stab(?:bed|bing|s)?|rape(?:d|s|ist)?|assault(?:ed|s)?|abuse(?:d|s|rs?)?|terror|explosion(?:s)?|explosive(?:s)?|wildfire(?:s)?|earthquake(?:s)?|quake(?:s)?|tsunami|landslide|wreckage|derail(?:ed|ment)?|fraud|burglar(?:y|s)?|theft|kidnap(?:ped|ping)?|hostage(?:s)?|trafficking|wound(?:ed|s)?|hospitalized|airstrike(?:s)?|bombard(?:ment|ed)?|missile(?:s)?|recession|bankrupt(?:cy)?|layoff(?:s)?|outbreak(?:s)?|infection(?:s)?|epidemic|pandemic|overdose(?:s)?|addiction|hurricane(?:s)?|heatwave|drought|cyclone|riot(?:s|ing)?|scandal(?:s)?|xenophob(?:ia|ic)?|homophob(?:ia|ic)?|hate crime|bigotry|typhoon(?:s)?|arson|inferno(?:s)?|redundanc(?:y|ies)?|job cut(?:s)?|job loss(?:es)?)(?!\p{L})/iu;
const BUCKET4 = /(?<!\p{L})(?:shot|shoot(?:ing|s|er)?|blast(?:s)?|flood(?:ing|s|ed)?|stolen|suspect(?:s)?|accused|war(?:s|fare|time)?|offensive|invasion|ceasefire|frontline|shortage(?:s)?|default(?:ed|s)?|collapse(?:d|s)?|strike(?:s)?|unrest|sanction(?:s)?|tension(?:s)?|crackdown|cut|storm(?:s)?|emergency|distress|desperate|plea|fear|panic|anger|grief|despair|tragic|tragedy|outrage|shock(?:ed|ing)?|dismay|fire(?:s|d)?|flame(?:s)?|blaze(?:s)?|sink(?:ing|s)?|sank|arrest(?:ed|s)?|injur(?:ed|y|ies)?)(?!\p{L})/iu;
const BUCKET5 = /Video|Explainer|LIVE|Watch|nieuwswekker|wekdienst|(?<!\d)112(?!\d)|\bMusk\b|\bTrump\b|(?<!\p{L})(?:onwerkelijk|kijk)(?!\p{L})/iu;

const BUCKETS = [["B1", BUCKET1], ["B2", BUCKET2], ["B3", BUCKET3], ["B4", BUCKET4], ["B5", BUCKET5]];
const BKT_KEYS = BUCKETS.map(([k]) => [k, k]);
const bucketOn = new Set(BUCKETS.map(([k]) => k));

function bucketsTitle(i) {
  if (i._bt === undefined) {
    const t = i.title || "";
    i._bt = BUCKETS.filter(([, re]) => re.test(t)).map(([k]) => k);
  }
  return i._bt;
}
function isBlocked(i) {
  for (const k of bucketsTitle(i)) if (bucketOn.has(k)) return true;
  return false;
}

let sort = { key: "D", dir: -1 };

const esc = s => String(s).replace(/[&<>"]/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const fmtScore = s => s === undefined ? "" : s > 0 ? "+" + s : String(s);
const dateVal = i => isNaN(i.date) ? 0 : i.date.getTime();
function fmtDate(d) {
  if (!d || isNaN(d)) return { day: "", time: "" };
  return {
    day: d.toLocaleDateString("nl-NL", { day: "numeric", month: "short" }),
    time: d.toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit" }),
  };
}
function dayBucket(d) {
  if (!d || isNaN(d)) return 0;
  const age = (Date.now() - d.getTime()) / 864e5;
  return age < 0 ? 1 : Math.floor(age) + 1;
}

const COLUMNS = [
  { key: "D", label: "D", defDir: -1, val: dateVal,
    plain: i => fmtDate(i.date).day },
  { key: "tijd", label: "Tijd", defDir: -1, off: true, val: dateVal,
    plain: i => fmtDate(i.date).time },
  { key: "bron", label: "Bron", defDir: 1, val: i => i.src },
  { key: "scope", label: "Scope", defDir: 1, val: i => scopesOf(i).join(" ") },
  { key: "score", label: "±", defDir: -1,
    val: i => i.score === undefined ? -99 : i.score,
    plain: i => fmtScore(i.score),
    attr: i => i.score === undefined ? "" : ` data-score="${i.score}"`,
    cell: i => i.score === undefined ? "·"
      : esc(fmtScore(i.score).replace("-", "−")) },
  { key: "bkt", label: "Bucket", defDir: 1, val: i => bucketsTitle(i).join(" ") },
  { key: "titel", label: "Titel", defDir: 1, val: i => i.title,
    md: i => `[${mdCell(i.title)}](${i.link})`,
    cell: i => `<a href="${i.link}" target="_blank" rel="noopener">${esc(i.title)}</a>` },
  { key: "samenvatting", label: "Samenvatting", defDir: 1, off: true, val: i => i.summary },
  { key: "link", label: "Link", defDir: 1, off: true, val: i => i.link,
    cell: i => `<a href="${i.link}" target="_blank" rel="noopener">${esc(i.link)}</a>` },
];
const COL_KEYS = COLUMNS.map(c => [c.key, c.label]);
const colOn = new Set(COLUMNS.filter(c => !c.off).map(c => c.key));
const enabledCols = () => COLUMNS.filter(c => colOn.has(c.key));
const plainOf = (c, i) => (c.plain || c.val)(i);
const cellOf = (c, i) => c.cell ? c.cell(i) : esc(plainOf(c, i));
const mdOf = (c, i) => c.md ? c.md(i) : mdCell(plainOf(c, i));

const FILTERS = {
  days: i => isNaN(i.date) || daysOn.has(dayBucket(i.date)),
  score: i => scoreOn.has(i.score === undefined ? "none" : String(i.score)),
  source: i => sources[i.sourceId].enabled,
  scope: i => scopesOf(i).some(k => scopeOn.has(k)),
  words: i => !isBlocked(i),
};
const FILTER_ENTRIES = Object.entries(FILTERS);
const passesFilters = (i, skip) => FILTER_ENTRIES.every(([k, f]) => k === skip || f(i));

const GROUPS = [
  { el: scopeG, keys: SCOPE_KEYS, set: scopeOn, skip: "scope", keysOf: scopesOf },
  { el: daysG, keys: DAY_KEYS, set: daysOn, skip: "days",
    keysOf: i => isNaN(i.date) || dayBucket(i.date) > DAYS ? [] : [dayBucket(i.date)] },
  { el: scoreG, keys: SCORE_KEYS, set: scoreOn, skip: "score",
    keysOf: i => [i.score === undefined ? "none" : String(i.score)] },
  { el: bktG, keys: BKT_KEYS, set: bucketOn, skip: "words", keysOf: bucketsTitle },
  { el: colG, keys: COL_KEYS, set: colOn },
];

function scoreTargets() {
  return allItems.filter(i => i.score === undefined && passesFilters(i));
}

function counts() {
  const perSrc = new Map();
  const perGroup = GROUPS.map(() => new Map());
  for (const i of allItems) {
    if (passesFilters(i, "source")) perSrc.set(i.sourceId, (perSrc.get(i.sourceId) || 0) + 1);
    GROUPS.forEach((g, k) => {
      if (!g.keysOf || !passesFilters(i, g.skip)) return;
      const m = perGroup[k];
      for (const key of g.keysOf(i)) m.set(key, (m.get(key) || 0) + 1);
    });
  }
  return { perSrc, perGroup };
}

const badge = n => n === "" || n === 0 ? "" : `<span>${n}</span>`;

function pill(label, n, on) {
  const b = document.createElement("label");
  b.dataset.l = label;
  b.innerHTML = badge(n);
  const box = document.createElement("input");
  box.type = "checkbox";
  box.checked = !!on;
  b.appendChild(box);
  if (n === 0) b.dataset.empty = "";
  return b;
}

function toggleGroup(g, m) {
  g.el.innerHTML = "";
  for (const [key, label] of g.keys) {
    const b = pill(label, m ? (m.get(key) || 0) : "", g.set.has(key));
    b.querySelector("input").onchange = () => {
      g.set.has(key) ? g.set.delete(key) : g.set.add(key);
      drawControls(); render();
    };
    g.el.appendChild(b);
  }
}

function drawScoreBtn() {
  const n = scoreTargets().length;
  scoreBtn.textContent = n ? `Scoor ${n}` : "Scoor";
  scoreBtn.disabled = !n;
}

function drawControls() {
  const { perSrc, perGroup } = counts();
  const anyLoaded = allItems.length > 0;

  srcEl.innerHTML = "";
  sources.forEach(s => {
    const b = pill(s.short, anyLoaded ? (perSrc.get(s.id) || 0) : "", s.enabled);
    b.querySelector("input").onchange = () => { s.enabled = !s.enabled; drawControls(); render(); };
    srcEl.appendChild(b);
  });

  GROUPS.forEach((g, k) => toggleGroup(g, g.keysOf && anyLoaded ? perGroup[k] : null));

  drawScoreBtn();
}

function pickDate(it) {
  const raw = it.querySelector("pubDate")?.textContent
    || it.getElementsByTagName("dc:date")[0]?.textContent || "";
  return new Date(raw);
}
function toSummary(html) {
  stripper.innerHTML = html || "";
  return (stripper.textContent || "").replace(/\s+/g, " ").trim();
}

async function attempt(url) {
  const ctl = new AbortController();
  const t = setTimeout(() => ctl.abort(), TIMEOUT_MS);
  try {
    const res = await fetch(url, { cache: "no-store", signal: ctl.signal });
    clearTimeout(t);
    return res.ok ? await res.text() : null;
  } catch { clearTimeout(t); return null; }
}
async function fetchOne(s) {
  const text = await attempt(relay(s.url));
  if (!text) return null;
  const doc = new DOMParser().parseFromString(text, "application/xml");
  if (doc.querySelector("parsererror")) return null;
  const items = [...doc.querySelectorAll("item")].map(it => ({
    title: it.querySelector("title")?.textContent?.trim() || "",
    link: it.querySelector("link")?.textContent?.trim() || "#",
    date: pickDate(it),
    summary: toSummary(it.querySelector("description")?.textContent || ""),
    sourceId: s.id, src: s.short,
  }));
  return items.length ? items : null;
}

function addItems(items) {
  for (const it of items) {
    if (it.link !== "#") {
      if (seenLinks.has(it.link)) continue;
      seenLinks.add(it.link);
    }
    allItems.push(it);
  }
}

const cmp = (a, b) => typeof a === "string" ? a.localeCompare(b, "nl") : a - b;

function render() {
  const col = COLUMNS.find(c => c.key === sort.key) || COLUMNS[0];
  const rows = allItems
    .filter(i => passesFilters(i))
    .sort((a, b) => cmp(col.val(a), col.val(b)) * sort.dir || dateVal(b) - dateVal(a));

  lastRows = rows;
  const cols = enabledCols();
  if (!cols.length) { out.textContent = "Geen kolommen gekozen."; return; }
  if (!rows.length) {
    out.textContent = loading ? "Laden…" : "Geen berichten binnen dit filter.";
    return;
  }
  const arrow = c => c.key === sort.key ? (sort.dir > 0 ? " ▲" : " ▼") : "";
  const head = cols.map(c => `<th>${c.label}${arrow(c)}</th>`).join("");
  const body = rows.map(i =>
    `<tr>${cols.map(c => `<td${c.attr ? c.attr(i) : ""}>${cellOf(c, i)}</td>`).join("")}</tr>`).join("");
  out.innerHTML = `<div><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
  out.querySelectorAll("th").forEach((th, k) => th.onclick = () => {
    const c = cols[k];
    sort = { key: c.key, dir: sort.key === c.key ? -sort.dir : c.defDir };
    render();
  });
}

async function writeClipboard(text, btnEl) {
  const old = btnEl.textContent;
  try {
    await navigator.clipboard.writeText(text);
    btnEl.textContent = `✓ ${lastRows.length}`;
  } catch { btnEl.textContent = "✗"; }
  setTimeout(() => { btnEl.textContent = old; }, 1400);
}
const mdCell = v => String(v).replace(/[\n\r]+/g, " ").replace(/\|/g, "\\|").trim();
function copyMd() {
  const cols = enabledCols(); if (!cols.length) return;
  writeClipboard([`| ${cols.map(c => c.label).join(" | ")} |`,
    `|${cols.map(() => "---").join("|")}|`,
    ...lastRows.map(i => `| ${cols.map(c => mdOf(c, i)).join(" | ")} |`)].join("\n"), copyMdBtn);
}

async function gfetch(body) {
  const res = await fetch(`${GBASE}${LLM_MODEL}:generateContent?key=${GKEY}`, {
    method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
  });
  return await res.json();
}
function parseScores(data) {
  const t = (data?.candidates?.[0]?.content?.parts || []).map(p => p.text || "").join("");
  return new Map(Object.entries(JSON.parse(t)).map(([k, v]) => [parseInt(k, 10), Number(v)]));
}

async function scoreVisible() {
  const need = scoreTargets();
  if (!need.length) { drawScoreBtn(); return; }
  scoreBtn.setAttribute("aria-busy", "true");
  try {
    const batches = [];
    for (let off = 0; off < need.length; off += SCORE_BATCH) batches.push(need.slice(off, off + SCORE_BATCH));
    let qi = 0;
    await Promise.all(Array.from({ length: SCORE_CONCURRENCY }, async () => {
      while (qi < batches.length) {
        const batch = batches[qi++];
        const prompt =
 `Je beoordeelt nieuwsberichten. Geef per bericht één score voor hoe goed of slecht het nieuws is voor mens, dier, natuur of samenleving:\n` +
`-2 overduidelijk negatief (bijv. ramp, geweld, ernstige schade, leed, fraude)\n` +
`-1 overwegend negatief\n` +
`0 neutraal, gemengd, of te weinig informatie om te beoordelen\n` +
`+1 overwegend positief\n` +
`+2 overduidelijk positief (bijv. nieuw initiatief, geslaagde actie, lintje, vooruitgang, investering, prijs toekenning)\n` +
`meet alleen de richting van het nieuws, niet de omvang of het bereik.\n` +
`Regels: promo-, marketing- en productgerichte items krijgen maximaal 0. \n` +
`Antwoord uitsluitend met een JSON-object, met elk bericht precies één keer, bijvoorbeeld {"1": -1, "2": 2}.\n` +
          batch.map((it, k) => `${k + 1}. ${(it.summary ? it.title + " — " + it.summary : it.title).replace(/\s+/g, " ").slice(0, 500)}`).join("\n");
        const data = await gfetch({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { responseMimeType: "application/json", temperature: 0 },
        });
        parseScores(data).forEach((s, idx) => { batch[idx - 1].score = s; });
        drawControls(); render();
      }
    }));
  } finally {
    scoreBtn.removeAttribute("aria-busy");
    drawControls(); render();
  }
}

async function loadAll() {
  const queue = [...sources];
  await Promise.all(Array.from({ length: CONCURRENCY }, async () => {
    while (queue.length) {
      const items = await fetchOne(queue.shift());
      if (items) addItems(items);
      drawControls(); render();
    }
  }));
  loading = false;
  drawControls(); render();
}

copyMdBtn.addEventListener("click", copyMd);
scoreBtn.addEventListener("click", scoreVisible);

drawControls();
loadAll();
</script>
