cadence:
  weekday: sunday

window:
  days: 7

fetch:
  concurrency: 6
  timeout_s: 15

enrich:
  concurrency: 8
  timeout_s: 20
  min_words: 100
  browser: true
  references:
    max: 3
    min_words: 60
    max_words: 1200
    deny:
      - google.com/preferences
      - ster.nl

edition:
  scope_items: {min: 1, max: 3}
  length_mix:
    long: {min: 1, max: 3}
    standard: {min: 2, max: 5}
    short: {min: 1, max: 3}
  words:
    long: {min: 450, max: 800}
    standard: {min: 250, max: 500}
    short: {min: 150, max: 300}
  body_words: {min: 2800, max: 3400}

write:
  concurrency: 3

review:
  concurrency: 3

compose:
  nr_offset: 3
  max_recompiles: 3
  weather:
    place: Wijchen
    latitude: 51.8103
    longitude: 5.7256
    days: 6
    timeout_s: 15

llm:
  stages:
    score:   {model: claude-haiku-4-5-20251001, batch_size: 80, concurrency: 6}
    select:  {model: claude-sonnet-5, effort: medium}
    enrich:  {model: claude-haiku-4-5-20251001}
    outline: {model: claude-opus-4-8, effort: medium}
    write:   {model: claude-sonnet-5, effort: medium}
    review:  {model: claude-sonnet-5, effort: medium}
    illustrate: {model: claude-sonnet-5, effort: medium}
    trim:    {model: claude-sonnet-5, effort: medium}
