cadence:
  weekday: sunday

window:
  days: 3

fetch:
  concurrency: 16
  timeout_s: 15

enrich:
  concurrency: 16
  timeout_s: 20
  min_words: 100
  browser: true
  references:
    max: 3
    min_words: 60
    max_words: 1200
    deny:
      - google.com/preferences
      - ster.nl

edition:
  scope_items: {min: 2, max: 3}
  length_mix:
    lang: {min: 1, max: 3}
    mid: {min: 2, max: 5}
    kort: {min: 2, max: 4}
  woorden:
    lang: {min: 450, max: 800}
    mid: {min: 250, max: 500}
    kort: {min: 150, max: 300}
  body_words: {min: 2800, max: 3400}

score:
  concurrency: 16

write:
  concurrency: 16

review:
  concurrency: 16

compose:
  nr_offset: 3
  max_recompiles: 3
  weather:
    place: Wijchen
    latitude: 51.8103
    longitude: 5.7256
    days: 6
    timeout_s: 15

llm:
  fases:
    score:   {model: claude-haiku-4-5-20251001, batch_size: 80, max_turns: 2}
    select:  {model: claude-sonnet-5, effort: low, max_turns: 2}
    enrich:  {model: claude-haiku-4-5-20251001, max_turns: 2}
    outline: {model: claude-opus-4-8, effort: medium, max_turns: 2}
    write:   {model: claude-sonnet-5, effort: high, max_turns: 2}
    review:  {model: claude-sonnet-5, effort: medium, max_turns: 3}
    illustrate: {model: claude-opus-4-8, effort: low, max_turns: 8}
