  length_mix:
    long: {min: 2, max: 3}
    standard: {min: 3, max: 5}
    short: {min: 2, max: 3}
  words:
    long: {min: 450, max: 800}
    standard: {min: 250, max: 500}
    short: {min: 150, max: 300}
  body_words: {min: 2800, max: 3400}
  paragraphs: {min: 3, max: 11}

write:
  concurrency: 3

review:
  concurrency: 3

llm:
  light:
    model: claude-haiku-4-5-20251001
    batch_size: 80
    concurrency: 6
  frontier:
    model: claude-sonnet-5
    effort: medium
