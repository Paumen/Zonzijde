<style>
:root{
  --paper:#f4ede0; --ink:#241f1a; --muted:#8a7f70; --line:#d8ccb8;
  --lokaal:#c85a3a; --regionaal:#c9962b; --nationaal:#3f7d6e; --internationaal:#4a6fa5;

}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:#211d18;color:var(--ink);
  font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;
  overflow:hidden;
}
#stage{position:relative;width:100vw;height:100vh;overflow:hidden;
  background:
    radial-gradient(120% 90% at 50% -10%, #efe6d4 0%, #e6dcc6 45%, #d8ccb0 100%);
}
/* ---- wood desk base ---- */
#stage::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,transparent 60%,rgba(60,40,20,.10) 100%);}

/* ---- top phase rail ---- */
#rail{position:absolute;top:0;left:0;right:0;height:64px;z-index:40;
  display:flex;background:rgba(28,24,19,.92);color:#f4ede0;
  box-shadow:0 2px 14px rgba(0,0,0,.35);}
.ph{flex:1;display:flex;flex-direction:column;justify-content:center;
  padding:6px 8px;border-right:1px solid rgba(255,255,255,.06);
  position:relative;opacity:.4;transition:opacity .5s, background .5s;}
.ph .fx{font-size:10px;letter-spacing:.14em;color:#c9b48f;font-weight:700}
.ph .nm{font-size:13px;font-weight:700;line-height:1.1;margin-top:2px}
.ph .role{font-size:10px;color:#a89b84;font-family:system-ui,sans-serif;margin-top:1px}
.ph.active{opacity:1;background:linear-gradient(180deg,rgba(200,90,58,.28),transparent)}
.ph.done{opacity:.72}
.ph.active::after{content:"";position:absolute;left:0;bottom:0;height:3px;
  width:var(--pp,0%);background:var(--lokaal);transition:width .2s linear}

/* ---- headline / caption ---- */
#cap{position:absolute;left:0;right:0;top:64px;z-index:30;text-align:center;
  padding:10px 12px 4px;pointer-events:none}
#capTitle{font-size:26px;font-weight:800;letter-spacing:.01em;
  text-shadow:0 1px 0 rgba(255,255,255,.5)}
#capSub{font-size:13px;color:#5f5647;font-family:system-ui,sans-serif;margin-top:2px;min-height:16px}
.model-badge{display:inline-flex;align-items:center;gap:6px;
  background:#241f1a;color:#f4ede0;border-radius:20px;padding:3px 11px;
  font-family:system-ui,sans-serif;font-size:12px;font-weight:600;margin-left:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.3)}
.model-badge .dot{width:7px;height:7px;border-radius:50%;background:#7ee3b0;
  box-shadow:0 0 8px #7ee3b0;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.35}}

/* ---- desk / item field ---- */
#field{position:absolute;inset:0}
.clip{position:absolute;left:0;top:0;
  width:118px;min-height:34px;background:#fffdf6;
  border:1px solid #e3d8c2;border-radius:2px;
  padding:5px 7px;font-size:9.5px;line-height:1.18;color:#2a251f;
  box-shadow:1px 2px 4px rgba(40,25,10,.18);
  transform:translate(-400px,-400px);
  transition:transform 1.15s cubic-bezier(.22,.61,.36,1), opacity .7s, width .6s, min-height .6s, background .5s, border-color .5s;
  will-change:transform,opacity;overflow:hidden;}
.clip .bron{font-family:system-ui,sans-serif;font-size:7px;letter-spacing:.06em;
  text-transform:uppercase;color:#a2937a;font-weight:700;margin-bottom:1px}
.clip .ttl{font-weight:600}
.clip .sc{position:absolute;right:3px;top:3px;width:6px;height:6px;border-radius:50%}
.sc-L{background:var(--lokaal)} .sc-R{background:var(--regionaal)}
.sc-N{background:var(--nationaal)} .sc-I{background:var(--internationaal)}
.clip .badge{position:absolute;right:-2px;bottom:-2px;font-family:system-ui,sans-serif;
  font-size:8px;font-weight:800;padding:1px 4px;border-radius:8px;color:#fff;opacity:0;
  transition:opacity .35s;transform:scale(.6)}
.clip.show-badge .badge{opacity:1;transform:scale(1)}
.badge.b-neg{background:var(--neg)} .badge.b-neu{background:var(--neu)} .badge.b-pos{background:var(--pos)}

.clip .reason{display:block;margin-top:3px;font-family:system-ui,sans-serif;
  font-size:7.5px;font-weight:700;color:var(--neg);opacity:0;transition:opacity .3s}
.clip.reason-on .reason{opacity:1}

.clip.rich{width:210px;box-shadow:2px 4px 12px rgba(40,25,10,.28);border-color:#d8c199}
.clip.rich .body{display:block;margin-top:4px;font-size:8px;color:#5b5346;line-height:1.3;
  max-height:0;overflow:hidden;transition:max-height .8s ease}
.clip.rich.open .body{max-height:120px}
.clip .tags{display:none;margin-top:4px;gap:3px;flex-wrap:wrap}
.clip.rich .tags{display:flex}
.tag{font-family:system-ui,sans-serif;font-size:7px;font-weight:700;padding:1px 5px;
  border-radius:8px;background:#efe4cd;color:#6b5d43;border:1px solid #ddd0b3}
.tag.ring{color:#fff}
.ring-L{background:var(--lokaal);border-color:var(--lokaal)}
.ring-R{background:var(--regionaal);border-color:var(--regionaal)}
.ring-N{background:var(--nationaal);border-color:var(--nationaal)}
.ring-I{background:var(--internationaal);border-color:var(--internationaal)}
.clip .wt{display:none}
.clip.rich .wt{display:block;font-style:italic;color:#8a7a5c;font-size:8px;margin-top:2px}
.clip .final-ttl{display:none;font-weight:800;color:#1c1811;font-size:11px;margin-top:2px}
.clip.finalized .final-ttl{display:block;animation:pop .5s}
.clip.finalized .wt{text-decoration:line-through;opacity:.45;color:#b04a3a}

/* leaving animation */
.clip.leaving{opacity:0!important}

/* ---- scan beam for LLM phases ---- */
#beam{position:absolute;top:110px;bottom:120px;width:150px;left:-200px;z-index:20;

/* ---- final paper ---- */
#paper{position:absolute;z-index:25;left:50%;top:118px;transform:translateX(-50%) scale(.96);

#paper.on{opacity:1}
.masthead{text-align:center;border-bottom:3px double #241f1a;padding-bottom:6px}
.masthead h1{font-size:38px;font-weight:900;letter-spacing:.02em;line-height:1}
.masthead .sub{display:flex;justify-content:space-between;font-family:system-ui,sans-serif;

.pgrid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.part{border-bottom:1px solid #e2d6bd;padding-bottom:5px;position:relative}
.part .k{font-family:system-ui,sans-serif;font-size:6.5px;font-weight:800;letter-spacing:.1em;

.part h3{font-size:11px;line-height:1.12;font-weight:800;color:#1c1811}
.part .lines{margin-top:3px}
.part .lines i{display:block;height:2px;background:#d9cdb4;margin-bottom:2.5px;border-radius:2px}
.part.big{grid-row:span 2}
.part.big h3{font-size:15px}
.part .ill{height:44px;border-radius:3px;margin-top:4px;
  background:linear-gradient(135deg,#e7d9bd,#cdb98f);position:relative;overflow:hidden}

#ctl{position:absolute;bottom:0;left:0;right:0;z-index:50;height:56px;

#ctl button:hover{background:#4c4437}
#ctl button.on{background:var(--lokaal);border-color:var(--lokaal)}
.spd{display:flex;gap:6px;align-items:center;font-family:system-ui,sans-serif;font-size:11px;color:#b6a98f}
#track{flex:1;height:5px;background:#4a4133;border-radius:4px;position:relative;overflow:hidden}
#trackfill{position:absolute;left:0;top:0;bottom:0;width:0;background:var(--regionaal)}
#clock{font-family:system-ui,sans-serif;font-size:11px;color:#b6a98f;min-width:70px;text-align:right}
.counter{position:absolute;left:50%;transform:translateX(-50%);bottom:150px;z-index:26;

.counter.on{opacity:1}
.legend{position:absolute;right:12px;top:78px;z-index:26;display:flex;gap:10px;

.legend span{display:flex;align-items:center;gap:4px}
.legend i{width:9px;height:9px;border-radius:50%}
#live{position:absolute;left:12px;top:78px;z-index:26;font-family:system-ui,sans-serif;
  font-size:10px;color:#8a7f70;background:rgba(255,253,246,.8);border:1px solid #e3d8c2;
  border-radius:14px;padding:3px 9px}
</style>

/* ---------- build clips ---------- */
const items = DATA.items;
const clips = [];
const SCOPE = {L:'lokaal',R:'regionaal',N:'nationaal',I:'internationaal'};
items.forEach((it,idx)=>{
  const el=document.createElement('div'); el.className='clip';
  el.innerHTML =
    `<span class="sc sc-${it.scope}"></span>`+
    `<div class="bron">${it.bron||''}</div>`+
    `<div class="ttl">${it.title}</div>`+
    `<span class="reason"></span>`+
    `<span class="badge"></span>`+
    `<div class="wt"></div><div class="final-ttl"></div>`+
    `<div class="body"></div><div class="tags"></div>`;
  field.appendChild(el);
  clips.push({el, it, idx,
    home:{x:0,y:0,r:0},           // intake pile spot
    baseX:0, baseY:0});
});

/* pile layout: a heap on the desk */
function computePile(){
  const cx=W()*0.5, cy=H()*0.52, spreadX=Math.min(W()*0.42,560), spreadY=Math.min(H()*0.30,300);
  clips.forEach(c=>{
    const a=rnd()*Math.PI*2, r=Math.sqrt(rnd());
    c.home.x = cx + Math.cos(a)*r*spreadX - 60;
    c.home.y = cy + Math.sin(a)*r*spreadY - 20 + (rnd()-.5)*40;
    c.home.r = (rnd()-.5)*26;
  });
}
computePile();

function place(c, x, y, r, s=1, op=1){
  c.el.style.transform=`translate(${x}px,${y}px) rotate(${r}deg) scale(${s})`;
  c.el.style.opacity=op;
  c.baseX=x; c.baseY=y;
}
function hide(c){ c.el.style.transform=`translate(${W()*0.5}px,${-260}px) rotate(0deg)`; c.el.style.opacity=0; }
clips.forEach(hide);

/* ---------- timeline engine ---------- */
let speed=1, playing=true, t0=performance.now(), elapsed=0;
const TOTAL = PHASES.reduce((a,p)=>a+p.t,0); // seconds of "presentation" time
let cursor=0, phaseIdx=-1, phaseStart=0;

const cap=document.getElementById('capSub');
const counter=document.getElementById('counter');
const beam=document.getElementById('beam');

function setCap(html){ cap.innerHTML=html; }
function modelBadge(m){ return m?`<span class="model-badge"><span class="dot"></span>${m} werkt…</span>`:''; }
function showCounter(txt){ counter.textContent=txt; counter.classList.add('on'); }
function hideCounter(){ counter.classList.remove('on'); }

/* per-phase target arrangers -------------------------------------------- */
function colStack(list, colX, topY, perCol, dx, dy){
  list.forEach((c,i)=>{ place(c, colX+Math.floor(i/perCol)*dx, topY+(i%perCol)*dy, (rnd()-.5)*3, .78, 1); });
}

const byFate = f => clips.filter(c=>c.it.fate===f);
const survivors = clips.filter(c=>c.it.fate==='final');
const slotsByPos = {}; DATA.slots.forEach(s=>slotsByPos[s.pos]=s);
// primary survivor per slot (one card per article on the page)
const primary = {};
survivors.forEach(c=>{ const p=c.it.slot.pos; if(!primary[p]||c.it.slot.primary) primary[p]=c; });
const finalCards = Object.values(primary).sort((a,b)=>a.it.slot.pos-b.it.slot.pos);

let ramp=[]; // intake order
function enterPhase(i){
  phaseIdx=i; const p=PHASES[i];
  document.querySelectorAll('.ph').forEach((e,j)=>{
    e.classList.toggle('active', j===i); e.classList.toggle('done', j<i);
  });
  document.getElementById('capTitle').textContent = p.fx+' · '+p.nm;
  beam.style.opacity=0;

  if(i===0){ // INTAKE
    setCap('RSS-bronnen scrapen — knipsels stromen binnen en stapelen op');
    showCounter('0 knipsels');
    ramp = clips.slice(); // will fly in over the phase
  }
  if(i===1){ // FILTER
    setCap('Buiten de datumwindow, duplicaten en negatief nieuws vallen af');
    // rejected leave with reason; kept gather to left column
    const rej=byFate('reject_f2');
    rej.forEach((c,k)=>{
      c.el.querySelector('.reason').textContent = c.it.reason||'geweerd';
      c.el.classList.add('reason-on');
      setTimeout(()=>{
        c.el.classList.add('leaving');
        c.el.style.transform=`translate(${W()+120}px, ${100+rnd()*(H()-260)}px) rotate(${(rnd()-.5)*90}deg)`;
      }, (k/rej.length)*p.t*900/speed);
    });
    const keep=clips.filter(c=>c.it.fate!=='reject_f2');
    setTimeout(()=>colStack(keep, W()*0.30, 130, 22, 128, 20), 300/speed);
    showCounter(DATA.counts.f2kept+' in venster · '+DATA.counts.f2rej+' geweerd');
  }
  if(i===2){ // SCORE (Haiku)
    setCap('Elke kop krijgt een sentimentscore'+modelBadge('Haiku 4.5'));
    runBeam(p.t);
    const kept=clips.filter(c=>c.it.fate!=='reject_f2');
    kept.forEach((c,k)=>{
      const neg = c.it.fate==='reject_f3' ;
      const pos = (c.it.fate==='positive'||c.it.fate==='candidate'||c.it.fate==='final');
      const cls = neg?'b-neg':(pos?'b-pos':'b-neu');
      const lab = (c.it.score>0?'+':'')+ (c.it.score??0);
      const bd=c.el.querySelector('.badge'); bd.className='badge '+cls; bd.textContent=lab;
      setTimeout(()=>{
        c.el.classList.add('show-badge');
        if(neg){ c.el.classList.add('leaving');
          c.el.style.transform=`translate(${c.baseX+ (rnd()-.5)*40}px, ${H()+120}px) rotate(${(rnd()-.5)*40}deg)`;}
      }, (k/kept.length)*p.t*950/speed);
    });
    // positives rise into center
    const good=clips.filter(c=>['positive','candidate','final'].includes(c.it.fate));
    setTimeout(()=>colStack(good, W()*0.34, 130, 20, 120, 19), p.t*500/speed);
    showCounter(DATA.counts.positive+' positief · '+ (DATA.counts.f2kept-DATA.counts.positive)+' negatief/neutraal');
  }
  if(i===3){ // SELECT (Sonnet)
    setCap('Clusteren tot onderwerpen en de sterkste kiezen'+modelBadge('Sonnet 5'));
    runBeam(p.t);
    const good=clips.filter(c=>['positive','candidate','final'].includes(c.it.fate));
    const drop=good.filter(c=>c.it.fate==='positive');
    drop.forEach((c,k)=>setTimeout(()=>{c.el.classList.add('leaving');
      c.el.style.transform=`translate(${-160}px, ${100+rnd()*(H()-260)}px) rotate(${(rnd()-.5)*60}deg)`;},
      (k/Math.max(drop.length,1))*p.t*800/speed));
    const cand=clips.filter(c=>['candidate','final'].includes(c.it.fate));
    setTimeout(()=>colStack(cand, W()*0.40, 135, 14, 150, 24), p.t*450/speed);
    showCounter(DATA.counts.topics+' onderwerpen · '+DATA.counts.candidates+' bronnen behouden');
  }
  if(i===4){ // ENRICH
    setCap('Onderzoeksjournalisten halen de volledige brontekst op — knipsels groeien');
    const cand=clips.filter(c=>['candidate','final'].includes(c.it.fate));
    cand.forEach(c=>{ c.el.classList.add('rich');
      c.el.querySelector('.body').textContent = (c.it.slot?c.it.slot.topic:c.it.topic||'');
      setTimeout(()=>c.el.classList.add('open'), 200/speed);
    });
    hideCounter();
  }
  if(i===5){ // OUTLINE (Opus)
    setCap('Hoofdredacteur bepaalt invalshoek en lengte, kiest 8 artikelen'+modelBadge('Opus 4.8'));
    runBeam(p.t);
    // non-final candidates drift away; finals line up in edition order
    clips.filter(c=>c.it.fate==='candidate').forEach((c,k)=>setTimeout(()=>{
      c.el.classList.add('leaving');
      c.el.style.transform=`translate(${W()+140}px, ${100+rnd()*(H()-260)}px) rotate(30deg)`;},
      (k/19)*p.t*700/speed));
    finalCards.forEach((c,k)=>{
      const s=c.it.slot;
      c.el.querySelector('.tags').innerHTML =
        `<span class="tag ring ring-${s.scope}">${SCOPE[s.scope]}</span>`+
        `<span class="tag">${s.length}</span>`;
      const col = k%2, row=Math.floor(k/2);
      setTimeout(()=>place(c, W()*0.30+col*230, 130+row*112, 0, 1, 1), 250/speed);
    });
    showCounter('8 slots gekozen — L·R·N·I in balans');
  }
  if(i===6){ // WRITE (Sonnet)
    setCap('Reporters schrijven het artikellichaam onder werktitel'+modelBadge('Sonnet 5'));
    runBeam(p.t);
    finalCards.forEach(c=>{
      const s=slotsByPos[c.it.slot.pos];
      c.el.querySelector('.wt').textContent='» '+(s.werktitel||s.topic);
      const b=c.el.querySelector('.body');
      typeInto(b, (s.angle||'')+' …', p.t*800/speed);
    });
    hideCounter();
  }
  if(i===7){ // REVIEW (Sonnet)
    setCap('Eindredacteuren scherpen de koppen aan — werktitel wordt definitief'+modelBadge('Sonnet 5'));
    finalCards.forEach((c,k)=>{
      const s=slotsByPos[c.it.slot.pos];
      setTimeout(()=>{ c.el.classList.add('finalized');
        c.el.querySelector('.final-ttl').textContent=s.finaltitle; },
        (k/8)*p.t*800/speed);
    });
    showCounter('8 definitieve koppen');
  }
  if(i===8){ // COMPOSE
    setCap('Vormgevers plaatsen alles in de krant — De Zonzijde nr. 4');
    hideCounter();
    buildPaper();
    finalCards.forEach((c,k)=>setTimeout(()=>{
      c.el.style.transition='transform 1s cubic-bezier(.5,0,.2,1),opacity .6s';
      c.el.style.transform=`translate(${W()*0.5}px, ${H()*0.5}px) scale(.2)`;
      c.el.style.opacity=0;
    },(k/8)*600/speed));
    setTimeout(()=>document.getElementById('paper').classList.add('on'), 1200/speed);
  }
}

function runBeam(sec){
  beam.style.transition='none'; beam.style.left='-200px'; beam.style.opacity='1';
  requestAnimationFrame(()=>{ beam.style.transition=`left ${sec/speed}s linear`; beam.style.left=(W()+60)+'px'; });
}
function typeInto(el, text, ms){
  el.textContent=''; let i=0; const n=text.length; const step=Math.max(1,Math.round(n/(ms/40)));
  const iv=setInterval(()=>{ i+=step; el.textContent=text.slice(0,i); if(i>=n)clearInterval(iv); }, 40);
}

/* intake ramp: reveal clips progressively during phase 0 */
function intakeProgress(frac){
  const n=Math.floor(frac*clips.length);
  for(let k=0;k<n;k++){ const c=clips[k]; if(!c._in){ c._in=true;
    place(c, c.home.x, c.home.y, c.home.r, 1, 1); } }
  showCounter(n+' knipsels');
}

/* ---------- paper ---------- */
function buildPaper(){
  const p=document.getElementById('paper');
  const ill = {6:1,4:1}; // positions that got illustrations
  let parts='';
  DATA.slots.forEach((s,i)=>{
    const big = s.length==='lang';
    const lines = Array.from({length: big?5:3}).map(()=>`<i style="width:${60+rnd()*40}%"></i>`).join('');
    parts+=`<div class="part ${big?'big':''}">
      <span class="k ring-${s.scope}">${SCOPE[s.scope]}</span>
      <h3>${s.finaltitle}</h3>
      ${ill[s.pos]?'<div class="ill"></div>':''}
      <div class="lines">${lines}</div></div>`;
  });
  p.innerHTML=`<div class="masthead"><h1>De Zonzijde</h1>
    <div class="sub"><span>Nr. 4</span><span>zaterdag 26 juli 2026</span><span>${DATA.edition.pages} pagina's · ${DATA.edition.words} woorden</span></div></div>
    <div class="pgrid">${parts}</div>`;
}

/* ---------- main loop ---------- */
const trackfill=document.getElementById('trackfill');
const clock=document.getElementById('clock');
function fmt(s){ s=Math.max(0,Math.floor(s)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

let acc=0; // seconds of presentation time consumed
function tick(now){
  const dt=(now-t0)/1000; t0=now;
  if(playing){ acc += dt*speed; }
  // find phase
  let cum=0, idx=0;
  for(let i=0;i<PHASES.length;i++){ if(acc < cum+PHASES[i].t){ idx=i; break;} cum+=PHASES[i].t; idx=i; }
  if(idx!==phaseIdx) enterPhase(idx);
  const local=(acc-cum), frac=Math.min(1, local/PHASES[idx].t);
  const phEl=document.getElementById('ph'+idx); if(phEl) phEl.style.setProperty('--pp',(frac*100)+'%');
  if(idx===0) intakeProgress(frac);
  trackfill.style.width=(Math.min(1,acc/TOTAL)*100)+'%';
  clock.textContent=fmt(acc)+' / '+fmt(TOTAL);
  if(acc>=TOTAL){ acc=TOTAL; playing=false; document.getElementById('play').textContent='▶ Speel'; }
  requestAnimationFrame(tick);
}
requestAnimationFrame(t=>{t0=t; requestAnimationFrame(tick);});

/* ---------- controls ---------- */
document.getElementById('play').onclick=function(){
  playing=!playing; this.textContent=playing?'❚❚ Pauze':'▶ Speel';
};
document.getElementById('restart').onclick=function(){
  clips.forEach(c=>{ c.el.className='clip'; c.el.style.transition='none'; hide(c); c._in=false;
    c.el.querySelector('.body').textContent=''; c.el.querySelector('.wt').textContent='';
    c.el.querySelector('.final-ttl').textContent=''; c.el.querySelector('.reason').textContent='';
    c.el.querySelector('.tags').innerHTML=''; });
  _s=987654321; computePile();
  requestAnimationFrame(()=>clips.forEach(c=>c.el.style.transition=''));
  document.getElementById('paper').classList.remove('on');
  acc=0; phaseIdx=-1; playing=true; document.getElementById('play').textContent='❚❚ Pauze';
  hideCounter();
};
document.querySelectorAll('.spd button').forEach(b=>b.onclick=function(){
  document.querySelectorAll('.spd button').forEach(x=>x.classList.remove('on'));
  this.classList.add('on'); speed=+this.dataset.s;
});
window.addEventListener('resize', ()=>{ if(phaseIdx<=0){computePile();} });
</script>
</body>
